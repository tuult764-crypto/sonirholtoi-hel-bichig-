<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сонирхолтой хэл бичиг | Дэлгүүр</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 2rem; max-width: 600px; width: 100%; padding: 2.5rem; position: relative; max-height: 90vh; overflow-y: auto; }
        .product-card { transition: all 0.3s; border: 1px solid #f3f4f6; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        #cart-bar { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 2px solid #ffedd5; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); padding: 1.2rem; z-index: 50; }
        .detail-img { width: 100%; border-radius: 1rem; margin-bottom: 10px; border: 1px solid #eee; }
    </style>
</head>
<body class="bg-stone-50 pb-32 font-sans">

    <header class="container mx-auto py-10 text-center">
        <img src="logo.png" alt="Logo" class="h-24 mx-auto mb-4 rounded-full bg-white p-2 shadow-sm">
        <h1 class="text-3xl font-bold text-[#8b4513]">Сонирхолтой хэл бичиг</h1>
        <p class="text-orange-600 text-sm tracking-widest uppercase mt-1 italic font-medium">Бүтээлч ажлын хуудсууд</p>
    </header>

    <main class="container mx-auto px-4 max-w-6xl">
        <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="cart-bar">
        <div class="container mx-auto max-w-4xl flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <p class="text-[10px] text-gray-400 uppercase font-black">Сонгосон бүтээлүүд:</p>
                <p id="cartItemsText" class="text-sm font-bold text-gray-700">Сагс хоосон</p>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right">
                    <p class="text-[10px] text-gray-400 uppercase font-black">Нийт дүн:</p>
                    <p id="cartTotalText" class="text-2xl font-black text-orange-700">0₮</p>
                </div>
                <button onclick="openCheckout()" class="bg-[#8b4513] text-white px-10 py-4 rounded-2xl font-bold shadow-lg hover:bg-orange-900 active:scale-95 transition-all">🛒 ХУДАЛДАН АВАХ</button>
            </div>
        </div>
    </div>

    <div id="checkoutModal" class="modal" onclick="if(event.target==this) closeCheckout()">
        <div class="modal-content">
            <button onclick="closeCheckout()" class="absolute top-6 right-8 text-2xl text-gray-400 hover:text-black">✕</button>
            <div id="orderView">
                <h2 class="text-2xl font-bold text-[#8b4513] mb-6">Захиалга баталгаажуулах</h2>
                <div class="bg-orange-50 p-6 rounded-[2rem] mb-6 border border-orange-100">
                    <p class="text-xs font-bold text-orange-400 uppercase mb-3">Сонгосон бүтээлүүд:</p>
                    <ul id="modalItemList" class="text-sm text-gray-700 space-y-3 mb-4"></ul>
                    <div class="border-t border-orange-200 pt-4 flex justify-between items-center">
                        <span class="font-bold text-gray-800">Нийт төлөх дүн:</span>
                        <span id="modalTotal" class="text-2xl font-black text-orange-700"></span>
                    </div>
                </div>
                <div class="bg-stone-50 p-6 rounded-[2rem] border-2 border-dashed border-orange-200 mb-8 flex items-center gap-6">
                    <img src="qr.png" class="h-24 w-24 rounded-2xl shadow-sm">
                    <div>
                        <p class="text-xs text-gray-500 uppercase font-bold">Хас Банк</p>
                        <p class="font-black text-xl text-[#8b4513] cursor-pointer" onclick="navigator.clipboard.writeText('5006069631'); alert('Данс хуулагдлаа')">5006069631</p>
                        <p class="font-bold text-gray-600 uppercase text-xs">МӨНХДАЛАЙ ТУУЛ</p>
                    </div>
                </div>
                <div class="space-y-4">
                    <input type="email" id="userEmail" placeholder="Файл хүлээн авах имэйл хаяг" class="w-full p-5 border-2 border-orange-50 rounded-2xl focus:border-orange-500 outline-none text-center font-bold">
                    <button id="submitBtn" onclick="submitOrder()" class="w-full bg-[#8b4513] text-white py-5 rounded-2xl font-bold shadow-xl hover:bg-black transition-all text-lg">МЭДЭЭЛЭЛ ИЛГЭЭХ</button>
                    <p id="statusMsg" class="text-center text-sm font-bold text-green-600"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 🚨 ЭНЭ ХЭСГИЙГ ӨӨРИЙН ЛИНКҮҮДЭЭР СОЛИОРОЙ
        const productURL = 'https://script.google.com/macros/s/AKfycbz-QTyWMP6IO2-xg8_L7fVeTlSRgIkk78zH_1VrczKasTuyMwR-XkujDH6oFwple3lfeA/exec'; // Products sheet-ийн линк
        const orderURL = 'https://script.google.com/macros/s/AKfycbzSXsLDDVBff24b2M3yI2WVsecdZCT_Jthi2F-Ykb277ZlJF8puAYWVjI2ZSnkGA6iLsg/exec'; // "сайт мэйл бүртгэл" sheet-ийн линк

        let cart = [];

       async function fetchProducts() {
    try {
        const res = await fetch(productURL);
        const products = await res.json();
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';

        products.forEach(p => {
            const card = document.createElement('div');
            card.className = "bg-white rounded-[2.5rem] p-6 product-card shadow-sm";

            // Үнэгүй эсэхийг шалгах логик
            const isFree = (p.price == "0" || p.price == "0₮" || p.price.includes("Үнэгүй"));

            card.innerHTML = `
                <div onclick='showDetails(${JSON.stringify(p)})' class="cursor-pointer">
                    <img src="${p.images[0].trim()}" class="h-64 w-full object-cover rounded-[2rem] mb-5">
                    <div class="flex justify-between mb-2">
                        <h3 class="font-bold text-xl text-gray-800">${p.title}</h3>
                        <span class="text-[#8b4513] font-black">${isFree ? 'ҮНЭГҮЙ' : p.price}</span>
                    </div>
                </div>
                ${isFree 
                    ? `<a href="${p.link}" target="_blank" class="block text-center w-full py-4 bg-green-100 text-green-700 rounded-2xl font-bold hover:bg-green-600 hover:text-white transition-all">📥 ШУУД ТАТАХ</a>`
                    : `<button onclick="addToCart('${p.title}', '${p.price}')" class="w-full py-4 bg-stone-100 text-[#8b4513] rounded-2xl font-bold hover:bg-[#8b4513] hover:text-white transition-all">＋ Сагсанд нэмэх</button>`
                }
            `;
            grid.appendChild(card);
        });
    } catch (err) {
        console.error("Алдаа гарлаа:", err);
    }
}

        function showDetails(p) {
            const list = document.getElementById('modalItemList');
            const imgsHtml = p.images.map(img => `<img src="${img.trim()}" class="detail-img">`).join('');
            list.innerHTML = `<div class="font-black text-xl mb-2">${p.title}</div><div class="text-sm text-gray-500 mb-4">${p.desc}</div><div class="max-h-60 overflow-y-auto">${imgsHtml}</div>`;
            document.getElementById('modalTotal').innerText = p.price;
            document.getElementById('checkoutModal').classList.add('active');
        }

        function addToCart(title, priceStr) {
            const price = parseInt(priceStr.replace(/[^0-9]/g, ''));
            cart.push({ title, price });
            updateCartUI();
        }

        function updateCartUI() {
            const bar = document.getElementById('cart-bar');
            if (cart.length > 0) {
                bar.style.display = 'block';
                document.getElementById('cartItemsText').innerText = cart.map(i => i.title).join(", ").substring(0, 50) + "...";
                const total = cart.reduce((sum, item) => sum + item.price, 0);
                document.getElementById('cartTotalText').innerText = total.toLocaleString() + "₮";
            } else { bar.style.display = 'none'; }
        }

        function openCheckout() {
            const list = document.getElementById('modalItemList');
            list.innerHTML = cart.map(i => `<li class="flex justify-between"><span>• ${i.title}</span> <b>${i.price.toLocaleString()}₮</b></li>`).join('');
            document.getElementById('modalTotal').innerText = cart.reduce((s, i) => s + i.price, 0).toLocaleString() + "₮";
            document.getElementById('checkoutModal').classList.add('active');
        }

        function closeCheckout() { document.getElementById('checkoutModal').classList.remove('active'); }

        function submitOrder() {
            const email = document.getElementById('userEmail').value.trim();
            if (!email.includes('@')) return alert("Имэйлээ зөв бичнэ үү!");
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Илгээж байна...";

            // Захиалгын мэдээллийг "сайт мэйл бүртгэл" рүү явуулна
            fetch(orderURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ email: email, product: cart.map(i => i.title).join(", ") }) 
            })
            .then(() => {
                document.getElementById('statusMsg').innerText = "✅ Амжилттай. Төлбөрөө төлнө үү.";
                setTimeout(() => { cart = []; updateCartUI(); closeCheckout(); }, 2500);
            });
        }

        fetchProducts();
    </script>
</body>
</html>
