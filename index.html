<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Туул Багш | Цахим Систем</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap');
        body { font-family: 'Manrope', sans-serif; background-color: #fdfaf7; }
        .section-content { display: none; }
        .section-content.active { display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal.active { display: flex; }
        .sudoku-grid { display: grid; grid-template-columns: repeat(9, 35px); border: 2px solid #4a2c2a; width: fit-content; margin: 10px auto; background-color: #4a2c2a; gap: 1px; }
        .sudoku-cell { width: 35px; height: 35px; background: white; text-align: center; font-size: 18px; font-weight: bold; outline: none; border: none; }
        .cell-fixed { background: #eee; color: #333; }
        .cell-user { color: #2563eb; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="authScreen" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white p-8 rounded-[2.5rem] shadow-2xl text-center border-t-8 border-orange-800">
            <h1 class="text-2xl font-black text-orange-900 mb-6 uppercase italic">Нэвтрэх</h1>
            <input type="email" id="loginEmail" placeholder="Бүртгэлтэй мэйл хаяг" class="w-full p-4 bg-gray-50 border rounded-2xl text-center font-bold mb-4 outline-none">
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-orange-800 text-white py-4 rounded-2xl font-black uppercase italic shadow-lg">Нэвтрэх</button>
        </div>
    </div>

    <div id="mainSystem" class="hidden">
        <nav class="bg-white border-b p-4 sticky top-0 z-50 flex justify-between items-center shadow-sm">
            <div onclick="showDashboard()" class="cursor-pointer font-black text-orange-900 italic uppercase">📚 Туул Багш</div>
            <div class="flex gap-3">
                <button onclick="showSection('cart')" class="bg-orange-100 p-2 rounded-full relative">🛒 <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">0</span></button>
                <button onclick="showSection('library')" class="bg-orange-50 px-3 py-1 rounded-full text-[10px] font-bold text-orange-700 uppercase italic">📂 Миний сан</button>
            </div>
        </nav>

        <div id="dashboardHome" class="container mx-auto px-4 py-8 max-w-6xl">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8 text-center font-black italic text-[10px] uppercase">
                <div onclick="showSection('planner')" class="bg-orange-600 p-6 rounded-3xl text-white cursor-pointer shadow-md">Хөтөлбөр</div>
                <div onclick="showSection('exam')" class="bg-blue-600 p-6 rounded-3xl text-white cursor-pointer shadow-md">Шалгалт</div>
                <div onclick="showSection('games')" class="bg-green-600 p-6 rounded-3xl text-white cursor-pointer shadow-md">Судоку</div>
                <div onclick="showSection('shop')" class="bg-yellow-500 p-6 rounded-3xl text-white cursor-pointer shadow-md">Дэлгүүр</div>
            </div>
            <h2 class="text-lg font-black text-orange-900 mb-6 italic uppercase">✨ Шинэ материалууд</h2>
            <div id="materialGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>

        <div id="shopSection" class="section-content container mx-auto px-4 py-8">
            <button onclick="showDashboard()" class="text-orange-800 font-bold mb-6 uppercase text-xs">← Буцах</button>
            <div id="fullShopGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>

        <div id="gamesSection" class="section-content container mx-auto p-4 text-center">
            <button onclick="showDashboard()" class="block text-left font-bold text-green-800 mb-4 uppercase text-xs">← Буцах</button>
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl inline-block border-t-8 border-green-700">
                <h2 class="text-md font-black text-green-900 mb-4 uppercase italic">Үндэсний бичгийн судоку</h2>
                <div id="sudokuContainer" class="sudoku-grid"></div>
                <button onclick="initSudoku()" class="mt-4 bg-green-700 text-white px-6 py-2 rounded-xl font-bold text-xs">ШИНЭ ТОГЛООМ</button>
            </div>
        </div>

        <div id="plannerSection" class="section-content container mx-auto max-w-2xl p-4">
            <button onclick="showDashboard()" class="text-orange-800 font-bold mb-4 text-xs uppercase">← Буцах</button>
            <div class="bg-white p-6 rounded-3xl shadow-lg text-center">
                <h2 class="font-black mb-4 uppercase italic">Хичээлийн төлөвлөгөө</h2>
                <input type="text" id="lessonTopic" placeholder="Сэдвээ бичнэ үү..." class="w-full p-4 border rounded-xl mb-4 bg-gray-50 outline-none">
                <button onclick="generateAI('planner')" id="planBtn" class="w-full bg-orange-800 text-white py-4 rounded-xl font-black uppercase italic">Боловсруулах</button>
                <div id="planResult" class="mt-6 p-4 border rounded-xl bg-gray-50 text-left text-sm hidden whitespace-pre-wrap"></div>
            </div>
        </div>

        <div id="cartSection" class="section-content container mx-auto max-w-xl px-4 py-8">
            <button onclick="showDashboard()" class="text-orange-800 font-bold mb-6 text-xs uppercase">← Буцах</button>
            <h2 class="text-xl font-black text-orange-900 mb-6 uppercase">🛒 Миний сагс</h2>
            <div id="cartItems" class="space-y-3"></div>
            <div id="cartTotal" class="mt-6 text-right font-black text-lg text-orange-900 border-t pt-4"></div>
            <button onclick="openPayment('Сагс')" id="cartPayBtn" class="hidden w-full bg-orange-800 text-white py-4 rounded-2xl font-black mt-6 shadow-xl uppercase italic">Худалдан авах</button>
        </div>
    </div>

    <div id="imageModal" class="modal" onclick="this.classList.remove('active')">
        <img id="modalImg" src="" class="max-w-full max-h-full rounded-lg shadow-2xl border-2 border-white">
    </div>

    <div id="paymentModal" class="modal" onclick="if(event.target==this) closePayment()">
        <div class="bg-white p-8 rounded-[2.5rem] max-w-sm w-full text-center border-8 border-orange-50">
            <h2 class="text-lg font-black text-orange-900 mb-4 uppercase italic">Төлбөр төлөх</h2>
            <img src="qr.png" class="w-40 h-40 mx-auto rounded-lg mb-4 shadow-sm" onerror="this.src='https://via.placeholder.com/150?text=QR'">
            <div class="bg-orange-50 p-4 rounded-xl text-left text-[10px] mb-6">
                <p class="font-bold text-gray-400">ГҮЙЛГЭЭНИЙ УТГА:</p>
                <p id="paymentNote" class="text-sm font-black text-orange-800"></p>
                <p class="mt-2 text-gray-400">ХАС БАНК: 5006069631</p>
            </div>
            <button onclick="confirmOrder()" class="w-full bg-orange-800 text-white py-4 rounded-xl font-black uppercase italic shadow-lg">Төлсөн, хүсэлт илгээх</button>
        </div>
    </div>

<script>
    const orderURL = 'https://script.google.com/macros/s/AKfycbyHc141qaOEPXks2asJ_soO7pBjO6Z_c_8epTiMTT3H52wntzz4ntSsMA3yDbqh01FQAg/exec';
    const RENDER_API_URL = 'https://sonirholtoi-hel-bichig.onrender.com/chat';
    const mongolNums = { '1': '᠑', '2': '᠒', '3': '᠓', '4': '᠔', '5': '᠕', '6': '᠖', '7': '᠗', '8': '᠘', '9': '᠙', '0': '' };
    
    let currentUserEmail = "";
    let cart = [];
    let productsData = [];

    async function handleLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        if(!email) return alert("Мэйл хаягаа оруулна уу!");
        const btn = document.getElementById('loginBtn');
        btn.innerText = "Уншиж байна..."; btn.disabled = true;
        try {
            const res = await fetch(`${orderURL}?action=check&email=${encodeURIComponent(email)}`);
            const data = await res.json();
            if (data.status === "success") {
                currentUserEmail = email;
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainSystem').classList.remove('hidden');
                loadProducts();
            } else { alert("Бүртгэлгүй мэйл!"); }
        } catch (e) { alert("Холболтын алдаа!"); }
        finally { btn.innerText = "Нэвтрэх"; btn.disabled = false; }
    }

    async function loadProducts() {
        const res = await fetch(`${orderURL}?action=getProducts`);
        productsData = await res.json();
        const renderHtml = (p) => {
            // Зургийн нэрсийн цуглуулгаас эхний зургийг авах
            const firstImg = p.Images.split(',')[0].trim();
            const imgPath = `https://raw.githubusercontent.com/tuult764-crypto/sonirholtoi-hel-bichig-/main/${firstImg}`;
            
            return `
            <div class="bg-white p-4 rounded-[2rem] shadow-md border border-orange-50 flex flex-col">
                <img src="${imgPath}" onclick="viewImage('${imgPath}')" class="w-full h-40 object-cover rounded-xl mb-3 cursor-pointer" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
                <h3 class="font-black text-[10px] text-orange-900 mb-1 h-8 overflow-hidden uppercase italic">${p.Title}</h3>
                <p class="font-bold text-orange-600 text-xs mb-3">${Number(p.Price).toLocaleString()}₮</p>
                <div class="grid grid-cols-1 gap-2">
                    <button onclick="viewImage('${imgPath}')" class="text-[9px] bg-gray-100 py-2 rounded-lg font-black uppercase italic">👁 Харах</button>
                    <button onclick="addToCart('${p.Title}')" class="text-[9px] bg-orange-100 text-orange-800 py-2 rounded-lg font-black uppercase italic">🛒 Сагслах</button>
                    <button onclick="openPayment('${p.Title}')" class="text-[9px] bg-orange-800 text-white py-2 rounded-lg font-black uppercase italic shadow-sm">💳 Худалдан авах</button>
                </div>
            </div>`;
        };
        const html = productsData.map(renderHtml).join('');
        document.getElementById('materialGrid').innerHTML = html;
        document.getElementById('fullShopGrid').innerHTML = html;
    }

    function viewImage(src) {
        document.getElementById('modalImg').src = src;
        document.getElementById('imageModal').classList.add('active');
    }

    function addToCart(title) {
        const prod = productsData.find(p => p.Title === title);
        cart.push(prod);
        updateCart();
        alert("Сагсанд нэмэгдлээ!");
    }

    function updateCart() {
        document.getElementById('cartCount').innerText = cart.length;
        const total = cart.reduce((sum, p) => sum + Number(p.Price), 0);
        document.getElementById('cartItems').innerHTML = cart.map((p, idx) => `
            <div class="flex justify-between items-center bg-white p-4 rounded-xl border shadow-sm">
                <span class="text-[10px] font-black italic uppercase">${p.Title}</span>
                <button onclick="cart.splice(${idx},1); updateCart();" class="text-red-500">❌</button>
            </div>`).join('');
        document.getElementById('cartTotal').innerText = `Нийт: ${total.toLocaleString()}₮`;
        document.getElementById('cartPayBtn').classList.toggle('hidden', cart.length === 0);
    }

    function openPayment(title) {
        document.getElementById('paymentNote').innerText = currentUserEmail;
        document.getElementById('paymentModal').classList.add('active');
    }

    function closePayment() { document.getElementById('paymentModal').classList.remove('active'); }

    function confirmOrder() {
        alert("Хүсэлт илгээгдлээ. Төлбөр баталгаажсаны дараа файл нээгдэнэ.");
        closePayment();
    }

    function initSudoku() {
        const container = document.getElementById('sudokuContainer');
        container.innerHTML = "";
        const board = [
            [5,3,0,0,7,0,0,0,0], [6,0,0,1,9,5,0,0,0], [0,9,8,0,0,0,0,6,0],
            [8,0,0,0,6,0,0,0,3], [4,0,0,8,0,3,0,0,1], [7,0,0,0,2,0,0,0,6],
            [0,6,0,0,0,0,2,8,0], [0,0,0,4,1,9,0,0,5], [0,0,0,0,8,0,0,7,9]
        ];
        board.flat().forEach(val => {
            const input = document.createElement('input');
            input.className = "sudoku-cell";
            input.value = mongolNums[val] || "";
            if(val !== 0) {
                input.readOnly = true; input.classList.add('cell-fixed');
            } else {
                input.classList.add('cell-user');
                input.addEventListener('input', (e) => {
                    const char = e.data;
                    if(mongolNums[char]) e.target.value = mongolNums[char];
                    else if(!Object.values(mongolNums).includes(e.target.value)) e.target.value = "";
                });
            }
            container.appendChild(input);
        });
    }

    async function generateAI(type) {
        const topic = document.getElementById('lessonTopic').value;
        const resArea = document.getElementById('planResult');
        const btn = document.getElementById('planBtn');
        if(!topic) return alert("Сэдэв бичнэ үү!");
        btn.innerText = "Уншиж байна..."; btn.disabled = true;
        resArea.classList.remove('hidden'); resArea.innerText = "Түр хүлээнэ үү...";
        try {
            const res = await fetch(RENDER_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: `Багшид зориулсан ${topic} сэдэвтэй төлөвлөгөө бич.` })
            });
            const data = await res.json();
            resArea.innerText = data.reply || data.content || "Алдаа гарлаа.";
        } catch (e) { resArea.innerText = "Сервер холбогдсонгүй."; }
        finally { btn.innerText = "Боловсруулах"; btn.disabled = false; }
    }

    function showSection(name) {
        document.getElementById('dashboardHome').classList.add('hidden');
        document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(name + 'Section');
        if(target) target.classList.add('active');
        if(name === 'games') initSudoku();
    }
    function showDashboard() {
        document.getElementById('dashboardHome').classList.remove('hidden');
        document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
    }
</script>
</body>
</html>
