<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сонирхолтой хэл бичиг | Систем</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap');
        body { font-family: 'Manrope', sans-serif; }
        .section-content { display: none; }
        .section-content.active { display: block; }
        .product-card { transition: all 0.3s; border: 1px solid #f3f4f6; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal.active { display: flex; }
        
        /* СУДОКУ СТАЙЛ */
        .sudoku-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 1px; background: #8b4513; border: 2px solid #8b4513; width: fit-content; margin: 0 auto; }
        .sudoku-cell { width: 35px; height: 35px; background: white; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; cursor: pointer; color: #8b4513; border: 0.1px solid #eee; }
        .sudoku-cell:hover { background: #fff5eb; }
        .sudoku-cell.fixed { background: #f9f9f9; color: #333; cursor: default; font-weight: 800; }
        .sudoku-cell.selected { background: #ffedd5 !important; outline: 2px solid #fb923c; z-index: 10; }
    </style>
</head>
<body class="bg-stone-50 min-h-screen pb-20">

    <div id="authScreen" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white p-10 rounded-[3rem] shadow-2xl border border-orange-100 text-center">
            <img src="logo.png" alt="Logo" class="h-20 mx-auto mb-4 rounded-full bg-white p-1 shadow-sm">
            <h1 class="text-2xl font-black text-orange-900 mb-2 uppercase italic">Сонирхолтой хэл бичиг</h1>
            <p class="text-gray-400 mb-8 text-xs uppercase tracking-widest">Багшийн нэгдсэн систем</p>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="Мэйл хаягаа оруулна уу" 
                    class="w-full p-4 bg-stone-50 border rounded-2xl outline-none focus:ring-2 ring-orange-200 font-bold text-center transition-all">
                <button onclick="handleLogin()" id="loginBtn" 
                    class="w-full bg-orange-800 text-white py-4 rounded-2xl font-black hover:bg-black transition-all shadow-lg">
                    СИСТЕМД НЭВТРЭХ
                </button>
                <p class="text-[10px] text-gray-400 uppercase leading-relaxed">Шинэ хэрэглэгч бол шууд нэвтэрч 2 үнэгүй эрх аваарай</p>
            </div>
        </div>
    </div>

    <div id="mainSystem" class="hidden">
        <nav class="bg-white border-b p-4 sticky top-0 z-50 shadow-sm">
            <div class="container mx-auto flex justify-between items-center px-2">
                <div class="flex items-center gap-2 cursor-pointer" onclick="showDashboard()">
                    <img src="logo.png" class="h-10 w-10 rounded-full border border-orange-100">
                    <span class="text-lg font-black text-orange-900 italic hidden md:block">Туул багшийн цахим хуудас</span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p id="displayEmail" class="text-[10px] font-bold text-gray-400"></p>
                        <p class="text-xs font-black text-orange-600 bg-orange-50 px-2 rounded-lg border border-orange-100">ЭРХ: <span id="displayCredits">0</span></p>
                    </div>
                    <div class="relative group">
                        <button class="w-10 h-10 bg-orange-800 text-white rounded-2xl font-bold flex items-center justify-center shadow-md">М</button>
                        <div class="absolute right-0 mt-2 w-56 bg-white rounded-2xl shadow-xl border border-orange-50 hidden group-hover:block p-2 overflow-hidden">
                            <button onclick="showSection('library')" class="w-full text-left p-3 hover:bg-orange-50 rounded-xl text-sm font-bold flex items-center gap-2 text-gray-700">📂 Миний сан</button>
                            <button onclick="location.reload()" class="w-full text-left p-3 hover:bg-red-50 rounded-xl text-sm font-bold flex items-center gap-2 text-red-500">🔒 Гарах</button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <div id="dashboardHome" class="container mx-auto px-4 py-10 max-w-6xl">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div onclick="showSection('planner')" class="group bg-white p-10 rounded-[3rem] border-b-8 border-orange-100 hover:border-orange-800 transition-all cursor-pointer shadow-sm text-center">
                    <div class="w-14 h-14 bg-orange-50 rounded-2xl flex items-center justify-center text-3xl mb-6 mx-auto group-hover:scale-110 transition-transform">✨</div>
                    <h3 class="font-black text-xl text-gray-800 uppercase">Хөтөлбөр боловсруулах</h3>
                    <p class="text-gray-400 text-sm mt-2 font-medium">AI-аар бүтээлч төлөвлөгөө гаргах</p>
                </div>
                <div onclick="showSection('shop')" class="group bg-white p-10 rounded-[3rem] border-b-8 border-blue-100 hover:border-blue-500 transition-all cursor-pointer shadow-sm text-center">
                    <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-3xl mb-6 mx-auto group-hover:scale-110 transition-transform">🛍️</div>
                    <h3 class="font-black text-xl text-gray-800 uppercase">Дэлгүүр</h3>
                    <p class="text-gray-400 text-sm mt-2 font-medium">Ажлын хуудас худалдан авах</p>
                </div>
                <div onclick="showSection('games')" class="group bg-white p-10 rounded-[3rem] border-b-8 border-green-100 hover:border-green-500 transition-all cursor-pointer shadow-sm text-center">
                    <div class="w-14 h-14 bg-green-50 rounded-2xl flex items-center justify-center text-3xl mb-6 mx-auto group-hover:scale-110 transition-transform">🎮</div>
                    <h3 class="font-black text-xl text-gray-800 uppercase">Тоглоом</h3>
                    <p class="text-gray-400 text-sm mt-2 font-medium">Хөгжөөнт тоглоомууд</p>
                </div>
            </div>
        </div>

        <div class="container mx-auto px-4 max-w-6xl">
            <div id="plannerSection" class="section-content bg-white p-8 rounded-[3rem] shadow-xl border border-orange-50">
                <button onclick="showDashboard()" class="text-sm font-bold text-orange-800 mb-6 italic">← БУЦАХ</button>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 italic">
                    <input type="text" id="managerName" placeholder="Менежерийн нэр..." class="p-4 border rounded-2xl bg-stone-50 font-bold outline-none">
                    <input type="text" id="topic" placeholder="Хичээлийн сэдэв..." class="p-4 border rounded-2xl bg-stone-50 font-bold outline-none">
                    <select id="gradeSelect" class="p-4 border rounded-2xl bg-stone-50 font-bold outline-none">
                        <option value="">Анги сонгох</option>
                        <option value="6">6-р анги</option><option value="7">7-р анги</option>
                        <option value="8">8-р анги</option><option value="9">9-р анги</option>
                        <option value="10">10-р анги</option><option value="11">11-р анги</option>
                        <option value="12">12-р анги</option>
                    </select>
                    <select id="subjectSelect" class="p-4 border rounded-2xl bg-stone-50 font-bold outline-none">
                        <option value="Монгол хэл">Монгол хэл</option>
                        <option value="Уран зохиол">Уран зохиол</option>
                        <option value="Үндэсний бичиг">Үндэсний бичиг</option>
                    </select>
                </div>
                <button onclick="generateAIPlan()" id="genBtn" class="w-full bg-orange-800 text-white py-5 rounded-2xl font-black hover:bg-black transition-all shadow-lg">ХӨТӨЛБӨР БОЛОВСРУУЛАХ (1 ЭРХ)</button>
                <button id="downloadBtn" style="display:none;" onclick="downloadPDF()" class="w-full mt-4 bg-green-600 text-white py-5 rounded-2xl font-black shadow-md italic tracking-widest">📥 PDF ТАТАХ (БАТЛАВ ТОЛГОЙТОЙ)</button>
            </div>

            <div id="shopSection" class="section-content">
                <button onclick="showDashboard()" class="text-sm font-bold text-blue-500 mb-6 italic">← БУЦАХ</button>
                <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>

            <div id="gamesSection" class="section-content bg-white p-8 rounded-[3rem] shadow-xl border border-green-50">
                <button onclick="showDashboard()" class="text-sm font-bold text-green-600 mb-6 italic">← БУЦАХ</button>
                <h2 class="text-2xl font-black mb-8 italic uppercase text-green-800 text-center">🇲🇳 Монгол бичгийн судоку</h2>
                
                <div class="max-w-md mx-auto bg-stone-50 p-6 rounded-[2rem] border-2 border-orange-100 shadow-inner">
                    <div id="sudokuBoard" class="sudoku-grid mb-6"></div>
                    <div class="flex flex-wrap justify-center gap-2 mb-4">
                        <button onclick="inputValue('᠑')" class="w-10 h-10 bg-white rounded-xl font-bold border border-orange-200 shadow-sm active:scale-95 transition-all">᠑</button>
                        <button onclick="inputValue('᠒')" class="w-10 h-10 bg-white rounded-xl font-bold border border-orange-200 shadow-sm active:scale-95 transition-all">᠒</button>
                        <button onclick="inputValue('᠓')" class="w-10 h-10 bg-white rounded-xl font-bold border border-orange-200 shadow-sm active:scale-95 transition-all">᠓</button>
                        <button onclick="inputValue('᠔')" class="w-10 h-10 bg-white rounded-xl font-bold border border-orange-200 shadow-sm active:scale-95 transition-all">᠔</button>
                        <button onclick="inputValue('᠕')" class="w-10 h-10 bg-white rounded-xl font-bold border border-orange-200 shadow-sm active:scale-95 transition-all">᠕</button>
                        <button onclick="inputValue('᠖')" class="w-10 h-10 bg-white rounded-xl font-bold border border-orange-200 shadow-sm active:scale-95 transition-all">᠖</button>
                        <button onclick="inputValue('᠗')" class="w-10 h-10 bg-white rounded-xl font-bold border border-orange-200 shadow-sm active:scale-95 transition-all">᠗</button>
                        <button onclick="inputValue('᠘')" class="w-10 h-10 bg-white rounded-xl font-bold border border
