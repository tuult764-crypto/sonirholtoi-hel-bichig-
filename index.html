        }

            background-color: #f4faff;

        }

<body class="font-body-md text-on-background flex flex-col min-h-screen">
<!-- Top Navigation Bar (Branding Only for Login) -->
<header class="w-full sticky top-0 z-40 bg-[#F8FAFB] shadow-sm border-b border-slate-200 flex items-center justify-center px-4 py-4">
<div class="flex items-center gap-2">
<div class="bg-primary p-1.5 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<h1 class="font-headline-sm text-primary tracking-tight">EduMongol AI</h1>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-container-padding py-xl max-w-md mx-auto w-full">
<!-- Welcome Hero Section -->
<div class="w-full text-center mb-lg">
<div class="mb-md relative inline-block">
<div class="w-24 h-24 rounded-full bg-secondary-container flex items-center justify-center mx-auto overflow-hidden shadow-sm">
<img alt="Teacher silhouette" class="w-full h-full object-cover" data-alt="Modern minimalist illustration of a teacher with digital glowing sparks, soft educational theme, pastel blue background, professional lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPWwg8rr7Dsv1sIimJ5wweRxpkyVnubRaKVBk0wbDEEh8YtBKju4XTp_AuLIgtyXKXBjyOhlf5BEvoLiSR2s97-KikrnAy5s9oUcBXgZ1fd14WvRInLUOX0_LRYLEjmnUj2EFvpHy_8DRy697bCr-_PiaJ1LG3tfU45E9OTUeBFou0as5L1sROO4INHskfYAXNrgHrhNu9AW2T4jn8MFgfHGlKsyyB4SXQ5w3oawsqmonkY8r9hj1eBDU19_vi3_AgERjNDXxYfH8"/>
</div>
<div class="absolute -bottom-1 -right-1 bg-tertiary-fixed p-1.5 rounded-full shadow-md flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-fixed text-sm" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
</div>
<h2 class="font-headline-md text-on-surface mb-xs">Тавтай морилно уу</h2>
<p class="font-body-sm text-on-secondary-container">Сургалтын дэвшилтэт системд нэвтэрнэ үү</p>
</div>
<!-- Login Form -->
<div class="w-full bg-white p-6 rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-surface-container-high flex flex-col gap-6">
<div class="space-y-4">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block font-label-md text-on-surface-variant px-1" for="email">Цахим шууд</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all font-body-md text-on-surface" id="email" placeholder="example@edu.mn" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="font-label-md text-on-surface-variant" for="password">Нууц үг</label>
<a class="font-label-md text-primary hover:underline" href="#">Нууц үг мартсан?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="w-full pl-10 pr-10 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all font-body-md text-on-surface" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
</div>
<!-- Login Button -->
<button class="w-full py-4 rounded-lg bg-primary text-white font-button shadow-md hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Нэвтрэх
                <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<!-- Social Login / Separator -->
<div class="relative py-2 flex items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 font-label-md text-outline">Эсвэл</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 rounded-lg border border-outline-variant hover:bg-surface transition-colors font-body-sm text-on-surface">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Google
                </button>
<button class="flex items-center justify-center gap-2 py-3 rounded-lg border border-outline-variant hover:bg-surface transition-colors font-body-sm text-on-surface">
<svg class="w-5 h-5" fill="#1877F2" viewbox="0 0 24 24">
<path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path>
</svg>

                </button>
</div>
</div>
<!-- Registration Link -->
<div class="mt-lg text-center">
<p class="font-body-sm text-on-secondary-container">
                Шинэ хэрэглэгч үү?

                    Бүртгүүлэх
                </a>
</p>

<footer class="mt-auto py-md text-center opacity-40">
<div class="flex items-center justify-center gap-4 text-outline text-[10px] font-label-md uppercase tracking-widest">
<span>Нууцлал</span>
<span class="w-1 h-1 rounded-full bg-outline"></span>
<span>Үйлчилгээний нөхцөл</span>
<span class="w-1 h-1 rounded-full bg-outline"></span>
<span>Тусламж</span>
