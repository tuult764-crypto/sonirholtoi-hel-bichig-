<!DOCTYPE html>
<html lang="mn" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сонирхолтой хэл бичиг | Нэгдсэн систем</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        /* Нэмэлт жижиг загварууд */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 2.5rem; max-width: 500px; width: 100%; padding: 2.5rem; position: relative; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #cart-bar { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 2px solid #ffedd5; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); padding: 1.2rem; z-index: 50; }
    </style>
</head>
<body class="bg-stone-50 pb-20">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-orange-100">
        <div class="container mx-auto px-4 flex justify-between items-center py-4">
            <div class="flex items-center gap-2">
                <div class="h-10 w-10 bg-[#8b4513] rounded-full flex items-center justify-center text-white font-bold">С</div>
                <span class="font-black text-[#8b4513] hidden sm:block">СОНИРХОЛТОЙ ХЭЛ БИЧИГ</span>
            </div>
            <div class="flex gap-4 md:gap-8 overflow-x-auto no-scrollbar font-bold text-sm text-gray-500">
                <a href="#planner" class="hover:text-orange-600 whitespace-nowrap">📝 Хөтөлбөр</a>
                <a href="#products" class="hover:text-orange-600 whitespace-nowrap">🎨 Даалгавар</a>
                <a href="#games" class="hover:text-orange-600 whitespace-nowrap">🎮 Тоглоом</a>
            </div>
            <div class="relative cursor-pointer" onclick="openCheckout()">
                <span class="text-2xl">🛒</span>
                <span id="cartBadge" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full font-bold">0</span>
            </div>
        </div>
    </nav>

    <section class="container mx-auto px-4 mt-6">
    <div id="loginSection" class="bg-white p-6 rounded-[2rem] border border-orange-100 shadow-sm flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-4 w-full md:w-auto">
            <input type="email" id="loginEmail" placeholder="Мэйл хаягаа оруулна уу" class="w-full md:w-64 p-4 border rounded-2xl outline-none focus:ring-2 ring-orange-100 bg-stone-50 font-bold">
            <button onclick="checkUserCredits()" id="loginBtn" class="bg-[#8b4513] text-white px-8 py-4 rounded-2xl font-bold hover:bg-black transition-all">НЭВТРЭХ</button>
        </div>
        <div id="userInfo" class="hidden flex items-center gap-4 bg-orange-50 px-6 py-3 rounded-2xl border border-orange-100">
            <span class="text-sm font-bold text-orange-800">👤 <span id="displayEmail"></span></span>
            <span class="bg-white px-4 py-1 rounded-full text-xs font-black text-orange-600 shadow-sm border border-orange-100">ЭРХ: <span id="userCredits">0</span></span>
        </div>
    </div>
</section>
    <main class="container mx-auto px-4 max-w-5xl mt-10">
        
        <section id="planner" class="bg-white p-8 md:p-12 rounded-[3rem] shadow-sm border border-orange-50 mb-16">
            <h2 class="text-2xl font-black text-[#8b4513] mb-6 text-center text-3xl">✨ AI Хичээл төлөвлөгч</h2>
            <div class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="managerName" placeholder="Менежерийн нэр (Батлах хэсэгт)" class="p-4 border rounded-2xl outline-none focus:ring-2 ring-orange-100 bg-stone-50">
                    <input type="text" id="topic" placeholder="Хичээлийн сэдэв..." class="p-4 border rounded-2xl outline-none focus:ring-2 ring-orange-100 bg-stone-50">
                </div>
                <button onclick="generateAIPlan()" id="genBtn" class="w-full bg-[#8b4513] text-white py-5 rounded-2xl font-black shadow-lg hover:bg-black transition-all uppercase tracking-wide">Хөтөлбөр боловсруулах</button>
                <button id="downloadBtn" style="display:none;" onclick="downloadPDF()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-bold shadow-lg hover:bg-green-700 transition-all">📥 PDF Татах (Батлав толгойтой)</button>
            </div>
        </section>

        <section id="games" class="mb-16">
            <div class="bg-purple-50 p-8 rounded-[3rem] border border-purple-100 text-center">
                <h2 class="text-2xl font-black text-purple-900 mb-6">🔢 Монгол бичгийн судоку</h2>
                <div id="sudoku-container" class="grid grid-cols-4 gap-2 w-64 h-64 mx-auto mb-6"></div>
                <button onclick="initSudoku()" class="bg-purple-600 text-white px-6 py-2 rounded-xl text-sm font-bold">Шинэчлэх</button>
                <p class="text-[10px] text-purple-400 mt-4 font-bold uppercase">᠑=1 | ᠒=2 | ᠓=3 | ᠔=4</p>
            </div>
        </section>

        <section id="products">
            <h2 class="text-2xl font-black text-[#8b4513] mb-8">🎨 Бүтээлч даалгаврууд</h2>
            <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </section>

    </main>

    <div id="cart-bar">
        <div class="container mx-auto flex justify-between items-center px-4">
            <div id="cartTotal" class="text-xl font-black text-orange-700">0₮</div>
            <button onclick="openCheckout()" class="bg-[#8b4513] text-white px-10 py-3 rounded-2xl font-bold">ХУДАЛДАН АВАХ</button>
        </div>
    </div>

    <div id="checkoutModal" class="modal" onclick="if(event.target==this) closeCheckout()">
        <div class="modal-content text-center">
            <h2 class="text-xl font-black mb-6">Захиалга баталгаажуулах</h2>
            <div id="orderList" class="text-left text-sm mb-6 bg-stone-50 p-4 rounded-2xl"></div>
            <img src="qr.png" class="w-32 h-32 mx-auto mb-4 rounded-xl">
            <p class="font-black text-[#8b4513]">5006069631</p>
            <p class="text-xs text-gray-400 mb-6 font-bold uppercase">МӨНХДАЛАЙ ТУУЛ (Хас Банк)</p>
            <input type="email" id="userEmail" placeholder="Имэйл хаяг" class="w-full p-4 border rounded-2xl mb-4 text-center bg-stone-50 outline-none focus:ring-2 ring-orange-100">
            <button onclick="submitOrder()" class="w-full bg-[#8b4513] text-white py-4 rounded-2xl font-bold hover:bg-black transition-all">МЭДЭЭЛЭЛ ИЛГЭЭХ</button>
        </div>
    </div>

    <script>
        // --- ТОХИРГОО ---
        const productURL = 'https://script.google.com/macros/s/AKfycbz-QTyWMP6IO2-xg8_L7fVeTlSRgIkk78zH_1VrczKasTuyMwR-XkujDH6oFwple3lfeA/exec';
        let cart = [];

        // --- AI ХӨТӨЛБӨР (Жишээ дата) ---
        async function generateAIPlan() {
            const btn = document.getElementById('genBtn');
            btn.innerText = "AI Боловсруулж байна..."; btn.disabled = true;
            
            // Туршилтын зорилгоор 2 секундын дараа дата гаргана (OpenAI API нэмж болно)
            setTimeout(() => {
                window.currentPlan = [
                    {time: "5", teacher: "Сэдэлжүүлэх асуулт асууна.", student: "Асуултад хариулна."},
                    {time: "15", teacher: "Шинэ сэдвийг тайлбарлана.", student: "Тэмдэглэл хөтөлнө."},
                    {time: "10", teacher: "Бүтээлч даалгавар өгнө.", student: "Бие даан ажиллана."}
                ];
                document.getElementById('downloadBtn').style.display = 'block';
                btn.innerText = "✅ Амжилттай боловсрууллаа";
            }, 1500);
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const manager = document.getElementById('managerName').value || ".................";
            
            doc.setFontSize(10);
            doc.text("БАТЛАВ: СУРГАЛТЫН МЕНЕЖЕР .............................. / " + manager + " /", 100, 20);
            doc.text("Огноо: " + new Date().toLocaleDateString(), 100, 26);
            
            doc.autoTable({
                startY: 40,
                head: [['Хугацаа', 'Багшийн үйл ажиллагаа', 'Сурагчийн үйл ажиллагаа']],
                body: window.currentPlan.map(p => [p.time+"'", p.teacher, p.student]),
                styles: { fontSize: 9 }
            });
            doc.save("lesson_plan.pdf");
        }

        // --- СУДОКУ ---
        const mNums = ['᠑', '᠒', '᠓', '᠔'];
        function initSudoku() {
            const container = document.getElementById('sudoku-container');
            container.innerHTML = '';
            const board = [[1,2,3,4],[3,4,1,2],[2,1,4,3],[4,3,2,1]].sort(() => Math.random() - 0.5);
            board.forEach(row => row.forEach(cell => {
                const d = document.createElement('div');
                d.className = "bg-white border border-purple-100 rounded-xl flex items-center justify-center font-bold text-xl text-purple-900 shadow-sm";
                d.innerText = Math.random() > 0.5 ? mNums[cell-1] : "";
                container.appendChild(d);
            }));
        }

        // --- ДЭЛГҮҮР ---
        async function fetchProducts() {
            try {
                const res = await fetch(productURL);
                const products = await res.json();
                document.getElementById('productGrid').innerHTML = products.map(p => `
                    <div class="bg-white p-5 rounded-[2.5rem] shadow-sm border border-stone-100 hover:shadow-md transition-all">
                        <img src="${p.images[0]}" class="h-48 w-full object-cover rounded-3xl mb-4">
                        <div class="flex justify-between items-center mb-4 px-2">
                            <h3 class="font-bold text-gray-800">${p.title}</h3>
                            <span class="text-[#8b4513] font-black">${p.price}</span>
                        </div>
                        <button onclick="addToCart('${p.title}', '${p.price}')" class="w-full py-3 bg-stone-50 text-[#8b4513] rounded-2xl font-bold hover:bg-[#8b4513] hover:text-white transition-all border border-stone-100">Сагсанд нэмэх</button>
                    </div>
                `).join('');
            } catch(e) { console.log("Дата ачаалахад алдаа гарлаа."); }
        }

        function addToCart(title, priceStr) {
            const price = parseInt(priceStr.replace(/[^0-9]/g, ''));
            cart.push({title, price});
            document.getElementById('cartBadge').innerText = cart.length;
            document.getElementById('cart-bar').style.display = 'block';
            document.getElementById('cartTotal').innerText = cart.reduce((s, i) => s + i.price, 0).toLocaleString() + "₮";
        }

        function openCheckout() {
            document.getElementById('orderList').innerHTML = cart.map(i => `<div>• ${i.title}</div>`).join('');
            document.getElementById('checkoutModal').classList.add('active');
        }
        function closeCheckout() { document.getElementById('checkoutModal').classList.remove('active'); }
        function submitOrder() { alert("Мэдээлэл илгээгдлээ. Төлбөрөө төлнө үү."); cart = []; location.reload(); }

        window.onload = () => { initSudoku(); fetchProducts(); };
    </script>
</body>
</html>
