<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сонирхолтой хэл бичиг | Систем</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap');
        body { font-family: 'Manrope', sans-serif; }
        .section-content { display: none; }
        .section-content.active { display: block; }
        .product-card { transition: all 0.3s; border: 1px solid #f3f4f6; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal.active { display: flex; }
        
        .sudoku-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 1px; background: #8b4513; border: 2px solid #8b4513; width: fit-content; margin: 0 auto; }
        .sudoku-cell { width: 35px; height: 35px; background: white; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; cursor: pointer; color: #8b4513; border: 0.1px solid #eee; }
        .sudoku-cell.fixed { background: #f9f9f9; color: #333; cursor: default; font-weight: 800; }
        .sudoku-cell.selected { background: #ffedd5 !important; outline: 2px solid #fb923c; z-index: 10; }
    </style>
</head>
<body class="bg-stone-50 min-h-screen pb-20">

    <div id="authScreen" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white p-10 rounded-[3rem] shadow-2xl border border-orange-100 text-center">
            <h1 class="text-2xl font-black text-orange-900 mb-2 uppercase italic">Сонирхолтой хэл бичиг</h1>
            <p class="text-gray-400 mb-8 text-xs uppercase tracking-widest">Багшийн нэгдсэн систем</p>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="Мэйл хаягаа оруулна уу" class="w-full p-4 bg-stone-50 border rounded-2xl outline-none text-center font-bold">
                <button onclick="handleLogin()" id="loginBtn" class="w-full bg-orange-800 text-white py-4 rounded-2xl font-black shadow-lg">СИСТЕМД НЭВТРЭХ</button>
            </div>
        </div>
    </div>

    <div id="mainSystem" class="hidden">
        <nav class="bg-white border-b p-4 sticky top-0 z-50 shadow-sm">
            <div class="container mx-auto flex justify-between items-center">
                <span onclick="showDashboard()" class="text-lg font-black text-orange-900 italic cursor-pointer">ТУУЛ БАГШИЙН ЦАХИМ ХУУДАС</span>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p id="displayEmail" class="text-[10px] font-bold text-gray-400"></p>
                        <p class="text-xs font-black text-orange-600 bg-orange-50 px-2 rounded-lg">ЭРХ: <span id="displayCredits">0</span></p>
                    </div>
                    <button onclick="showSection('library')" class="bg-stone-100 p-2 rounded-xl text-sm font-bold">📂 САН</button>
                </div>
            </div>
        </nav>

        <div id="dashboardHome" class="container mx-auto px-4 py-10 max-w-6xl">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div onclick="showSection('planner')" class="bg-white p-10 rounded-[3rem] border-b-8 border-orange-100 hover:border-orange-800 transition-all cursor-pointer shadow-sm text-center">
                    <h3 class="font-black text-xl text-gray-800">ХӨТӨЛБӨР БОЛОВСРУУЛАХ</h3>
                </div>
                <div onclick="showSection('shop')" class="bg-white p-10 rounded-[3rem] border-b-8 border-blue-100 hover:border-blue-500 transition-all cursor-pointer shadow-sm text-center">
                    <h3 class="font-black text-xl text-gray-800">ДЭЛГҮҮР</h3>
                </div>
                <div onclick="showSection('games')" class="bg-white p-10 rounded-[3rem] border-b-8 border-green-100 hover:border-green-500 transition-all cursor-pointer shadow-sm text-center">
                    <h3 class="font-black text-xl text-gray-800">ТОГЛООМ</h3>
                </div>
            </div>
        </div>

        <div id="plannerSection" class="section-content container mx-auto max-w-4xl px-4">
            <div class="bg-white p-8 rounded-[3rem] shadow-xl border border-orange-50">
                <button onclick="showDashboard()" class="text-sm font-bold text-orange-800 mb-6 italic">← БУЦАХ</button>
                
                <div class="flex gap-4 mb-6">
                    <button onclick="setPlanType('unit')" id="unitBtn" class="flex-1 py-3 rounded-2xl border-2 border-orange-800 font-bold text-orange-800">НЭГЖ ХИЧЭЭЛ</button>
                    <button onclick="setPlanType('lesson')" id="lessonBtn" class="flex-1 py-3 rounded-2xl bg-orange-800 text-white font-bold">ЭЭЛЖИТ ХИЧЭЭЛ</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 italic">
                    <input type="text" id="managerName" placeholder="Менежерийн нэр..." class="p-4 border rounded-2xl bg-stone-50 font-bold outline-none">
                    <input type="text" id="topic" placeholder="Хичээлийн сэдэв..." class="p-4 border rounded-2xl bg-stone-50 font-bold outline-none">
                    
                    <div id="unitHourBox" class="hidden col-span-1 md:col-span-2">
                        <select id="unitHours" class="w-full p-4 border rounded-2xl bg-orange-50 font-black outline-none border-orange-200">
                            <option value="2">2 цагийн нэгж хичээл</option>
                            <option value="4">4 цагийн нэгж хичээл</option>
                            <option value="6">6 цагийн нэгж хичээл</option>
                            <option value="8">8 цагийн нэгж хичээл</option>
                        </select>
                    </div>

                    <select id="gradeSelect" class="p-4 border rounded-2xl bg-stone-50 font-bold outline-none">
                        <option value="">Анги сонгох</option>
                        <option value="6">6-р анги</option><option value="7">7-р анги</option>
                        <option value="8">8-р анги</option><option value="9">9-р анги</option>
                        <option value="10">10-р анги</option><option value="11">11-р анги</option><option value="12">12-р анги</option>
                    </select>
                    
                    <select id="subjectSelect" class="p-4 border rounded-2xl bg-stone-50 font-bold outline-none">
                        <option value="Монгол хэл">Монгол хэл</option>
                        <option value="Уран зохиол">Уран зохиол</option>
                        <option value="Үндэсний бичиг">Үндэсний бичиг</option>
                    </select>
                </div>

                <button onclick="generateAIPlan()" id="genBtn" class="w-full bg-orange-800 text-white py-5 rounded-2xl font-black shadow-lg">ХӨТӨЛБӨР БОЛОВСРУУЛАХ (1 ЭРХ)</button>
                <button id="downloadBtn" style="display:none;" onclick="downloadPDF()" class="w-full mt-4 bg-green-600 text-white py-5 rounded-2xl font-black italic">📥 PDF ТАТАХ</button>

                <div class="mt-10 border-t pt-8">
                    <h3 class="text-center font-black text-gray-400 text-[10px] uppercase mb-6 italic">Эрх авах багцууд</h3>
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="buyCredits(5, 2000)" class="p-4 bg-white rounded-2xl border-2 border-orange-100">5 эрх - 2000₮</button>
                        <button onclick="buyCredits(10, 4000)" class="p-4 bg-white rounded-2xl border-2 border-orange-100">10 эрх - 4000₮</button>
                        <button onclick="buyCredits(25, 10000)" class="p-4 bg-white rounded-2xl border-2 border-orange-100">25 эрх - 10000₮</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="shopSection" class="section-content px-4"><div id="productGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div></div>
        <div id="gamesSection" class="section-content px-4 text-center"><div id="sudokuBoard" class="sudoku-grid mb-6"></div></div>
        <div id="librarySection" class="section-content px-4"><div id="worksList" class="space-y-2"></div></div>
    </div>

    <div id="cart-bar" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t p-6 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <p id="cartTotalText" class="text-2xl font-black text-orange-800"></p>
            <button onclick="openCheckout()" class="bg-orange-800 text-white px-10 py-4 rounded-2xl font-bold">🛒 ХУДАЛДАН АВАХ</button>
        </div>
    </div>

    <div id="checkoutModal" class="modal" onclick="if(event.target==this) closeCheckout()">
        <div class="bg-white p-8 rounded-[3rem] max-w-md w-full relative">
            <h2 class="text-xl font-black text-orange-800 mb-6 uppercase">Төлбөр төлөх</h2>
            <div id="modalItemList" class="mb-4 text-sm space-y-2"></div>
            <div class="bg-orange-50 p-6 rounded-3xl border border-orange-100 mb-6">
                <p class="text-[10px] font-bold text-gray-400">Хас Банк: 5006069631</p>
                <p class="font-black text-orange-900">МӨНХДАЛАЙ ТУУЛ</p>
            </div>
            <button id="submitBtn" onclick="submitOrder()" class="w-full bg-orange-800 text-white py-5 rounded-2xl font-black">МЭДЭЭЛЭЛ ИЛГЭЭХ</button>
            <p id="statusMsg" class="text-center text-sm font-bold text-green-600 mt-4"></p>
        </div>
    </div>

    <script>
        const productURL = 'https://script.google.com/macros/s/AKfycbz-QTyWMP6IO2-xg8_L7fVeTlSRgIkk78zH_1VrczKasTuyMwR-XkujDH6oFwple3lfeA/exec';
        const orderURL = 'https://script.google.com/macros/s/AKfycbw9ZhMNyyGakT6hcZg1lcqUBYJ8Va082M9mojWzTOxYAOMeUvjnsMM_o7irCjfp_pvMNQ/exec'; 

        let currentUserEmail = "", userCredits = 0, cart = [], currentPlan = null, currentPlanType = 'lesson';

        function showSection(name) {
            document.getElementById('dashboardHome').classList.add('hidden');
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.getElementById(name + 'Section').classList.add('active');
        }

        function showDashboard() {
            document.getElementById('dashboardHome').classList.remove('hidden');
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
        }

        function setPlanType(type) {
            currentPlanType = type;
            document.getElementById('unitHourBox').style.display = type === 'unit' ? 'block' : 'none';
            document.getElementById('unitBtn').className = type === 'unit' ? "flex-1 py-3 rounded-2xl bg-orange-800 text-white font-bold" : "flex-1 py-3 rounded-2xl border-2 border-orange-800 font-bold text-orange-800";
            document.getElementById('lessonBtn').className = type === 'lesson' ? "flex-1 py-3 rounded-2xl bg-orange-800 text-white font-bold" : "flex-1 py-3 rounded-2xl border-2 border-orange-800 font-bold text-orange-800";
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            if(!email.includes('@')) return alert("Мэйлээ оруулна уу!");
            try {
                const res = await fetch(orderURL, { method: 'POST', body: JSON.stringify({ email: email, action: "check" }) });
                const data = await res.json();
                if(data.status === "success") {
                    currentUserEmail = email; userCredits = data.credits;
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('mainSystem').classList.remove('hidden');
                    document.getElementById('displayEmail').innerText = email;
                    document.getElementById('displayCredits').innerText = userCredits;
                }
            } catch(e) { alert("Алдаа гарлаа!"); }
        }

        async function generateAIPlan() {
            if(userCredits <= 0) return alert("Эрх дууссан байна!");
            const topic = document.getElementById('topic').value.trim();
            const grade = document.getElementById('gradeSelect').value;
            const subject = document.getElementById('subjectSelect').value;
            if(!topic || !grade) return alert("Мэдээллээ бүрэн оруулна уу!");

            const btn = document.getElementById('genBtn');
            btn.innerText = "AI Боловсруулж байна..."; btn.disabled = true;

            let instruction = currentPlanType === 'unit' ? `${grade}-р ангийн ${subject} хичээлийн ${topic} сэдвээр ${document.getElementById('unitHours').value} цагийн НЭГЖ хөтөлбөр` : `${grade}-р ангийн ${subject} хичээлийн ${topic} сэдвээр ЭЭЛЖИТ хөтөлбөр`;
            const fullPrompt = `Чи бол багш. ${instruction} гарга. JSON: [{"step": "Алхам", "time": "5", "teacher": "үйлдэл", "student": "үйлдэл", "homework": "даалгавар"}]`;

            try {
                const response = await fetch("/.netlify/functions/chat", { method: "POST", body: JSON.stringify({ prompt: fullPrompt }) });
                const aiData = await response.json();
                currentPlan = JSON.parse(aiData.choices[0].message.content.replace(/```json|```/g, "").trim());
                
                await fetch(orderURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ email: currentUserEmail, action: "use", topic: topic }) });
                userCredits--; document.getElementById('displayCredits').innerText = userCredits;
                document.getElementById('downloadBtn').style.display = 'block';
                btn.innerText = "✅ ХӨТӨЛБӨР БЭЛЭН";
            } catch (e) { alert("Алдаа гарлаа."); } finally { btn.disabled = false; }
        }

        function buyCredits(amount, price) {
            cart = [{ title: `${amount} эрх авах`, price: price }];
            updateCartUI(); openCheckout();
        }

        function updateCartUI() {
            const bar = document.getElementById('cart-bar');
            if (cart.length > 0) {
                bar.classList.remove('hidden');
                document.getElementById('cartTotalText').innerText = cart[0].price.toLocaleString() + "₮";
            } else { bar.classList.add('hidden'); }
        }

        function openCheckout() {
            document.getElementById('modalItemList').innerHTML = cart.map(i => `<div>${i.title}: ${i.price}₮</div>`).join('');
            document.getElementById('checkoutModal').classList.add('active');
        }
        function closeCheckout() { document.getElementById('checkoutModal').classList.remove('active'); }

        function submitOrder() {
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Илгээж байна...";
            fetch(orderURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ email: currentUserEmail, action: "order", productName: cart[0].title }) })
            .then(() => {
                document.getElementById('statusMsg').innerText = "✅ Амжилттай. Төлбөрөө төлнө үү.";
                setTimeout(() => { cart = []; updateCartUI(); closeCheckout(); }, 2000);
            });
        }
    </script>
</body>
</html>
