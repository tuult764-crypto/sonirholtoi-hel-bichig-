        @media print {
            body * { visibility: hidden; }
            #aiResultArea, #aiResultArea * { visibility: visible; }

    // 1. НЭВТРЭХ ФУНКЦ
    async function handleLogin() {
        const emailInput = document.getElementById('loginEmail');
        const email = emailInput.value.trim();
        const btn = document.getElementById('loginBtn');

        if (!email) return alert("Мэйл хаягаа оруулна уу!");

        btn.innerText = "Шалгаж байна...";
        btn.disabled = true;
        
        try {
            const response = await fetch(`${orderURL}?action=check&email=${encodeURIComponent(email)}`);
            const data = await response.json();

            if (data.status === "success" || data.credits !== undefined) {
                currentUserEmail = email;
                userCredits = data.credits;

                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainSystem').classList.remove('hidden');
                
                document.getElementById('displayEmail').innerText = email;
                document.getElementById('displayCredits').innerText = userCredits;
                document.getElementById('payEmail').innerText = email;

                loadProducts(); 
            } else {
                alert("Бүртгэлгүй мэйл хаяг байна. Мэйлээ шалгана уу.");
            }
        } catch (error) {
            console.error(error);
            alert("Холболтын алдаа гарлаа. Google Script Deploy хийсэн эсэхээ шалгана уу.");
        } finally {
            btn.innerText = "НЭВТРЭХ";
            btn.disabled = false;
        }
    }

function getDirectImg(url) {
    if (url.includes('drive.google.com')) {
        return url.replace('/file/d/', '/uc?export=view&id=').replace('/view?usp=drive_link', '').replace('/view?usp=sharing', '');
    }
    return url;
}

async function loadProducts() {
    const grid = document.getElementById('materialGrid');
    const shopGrid = document.getElementById('shopGrid');
    if (!grid) return;

    try {
        const res = await fetch(`${orderURL}?action=getProducts`);
        const products = await res.json();
        
        grid.innerHTML = ''; 
        if(shopGrid) shopGrid.innerHTML = '';
        
        products.forEach(p => {
            let rawUrl = p.Images || "";
            let imgUrl = "https://via.placeholder.com/300x200?text=Зураг+Байхгүй"; 

            // Google Drive линкийг Direct Link болгох (Зассан хувилбар)
            if (rawUrl.includes('drive.google.com')) {
                let fileId = "";
                if (rawUrl.includes('/d/')) {
                    fileId = rawUrl.split('/d/')[1].split('/')[0];
                } else if (rawUrl.includes('id=')) {
                    fileId = rawUrl.split('id=')[1].split('&')[0];
                }
                if (fileId) {
                    imgUrl = `https://lh3.googleusercontent.com/d/${fileId}`;
                }
            } else {
                imgUrl = rawUrl;
            }

            const price = Number(p.Price).toLocaleString();
            
            const cardHTML = `

                    </div>

            grid.innerHTML += cardHTML;
            if(shopGrid) shopGrid.innerHTML += cardHTML;
        });
    } catch (e) {
        console.error("Бараа ачаалахад алдаа гарлаа:", e);
    }

    async function generateAIPlan() {
    if(userCredits <= 0) return alert("Эрх хүрэлцэхгүй байна!");
    const btn = document.getElementById('genBtn');
    const grade = document.getElementById('gradeSelect').value;
    const topic = document.getElementById('lessonTopic').value;
    if(!topic) return alert("Сэдвээ оруулна уу!");

    btn.innerText = "AI боловсруулж байна...";
    btn.disabled = true;

    // МЭРГЭЖЛИЙН ТҮВШНИЙ PROMPT
    const professionalPrompt = `Та Монгол хэл, уран зохиол, үндэсний бичгийн мэргэжлийн багш, арга зүйч. 
    ${grade}-ийн "${topic}" сэдвээр 40 минутын ЭЭЛЖИТ ХИЧЭЭЛИЙН ТӨЛӨВЛӨГӨӨ боловсруул.
    
    ШААРДЛАГА:
    1. Medle.mn-ийн стандарт: Хичээлийн зорилго, зорилт, ашиглах хэрэглэгдэхүүн, арга зүйг тодорхой бичих.
    2. Алхам бүр (Сэдэлжүүлэлт, Шинэ мэдлэг, Батгах, Дүгнэлт) маш нарийн дэлгэрэнгүй байх.
    3. Идэвхтэй сургалтын аргууд ашиглан төлөвлөгөөг зохионо.
    4. Монгол улсын боловсрол шинжлэх ухааны яамнаас гаргасан сурах бичгүүдийг мөн ашиглана.
    5. Багшийн үйлдэл хэсэгт: "Асуулт асууна, тайлбарлана" биш, яг ямар асуулт асуухыг нь эш татаж бичих.
    6. Хариултыг JSON-оор: {"goal": "...", "tools": "...", "method": "...", "plan": [{"step": "...", "time": "...", "teacher": "...", "student": "...", "resource": "..."}]} форматаар өг.`;

    try {
        const response = await fetch(RENDER_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: professionalPrompt })
        });

        const data = await response.json();
        // Backend-ээс ирсэн датаг шалгах
        const res = data.plan ? data : (data.data ? data.data : data); 

        let html = `
            <div id="printArea" class="p-10 bg-white border-[3px] border-black text-black leading-relaxed">
                <div class="flex justify-between items-start mb-6 border-b-2 border-black pb-4">

                        <p>БАТЛАВ: СУРГАЛТЫН МЕНЕЖЕР ...........................</p>
                        <p class="mt-1 italic font-normal text-[10px]">202... он ... сар ... өдөр</p>
                    </div>
                    <div class="text-right">
                        <h1 class="font-black text-2xl uppercase underline italic text-orange-900">Ээлжит хичээлийн хөтөлбөр</h1>
                        <p class="font-bold text-lg mt-1">${grade}: ${topic}</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6 text-[13px] border-b border-gray-300 pb-4">
                    <div><strong>Хичээлийн зорилго:</strong> ${res.goal || "Мэдлэг олгох, чадвар эзэмшүүлэх"}</div>
                    <div><strong>Арга зүй:</strong> ${res.method || "Идэвхтэй сургалтын аргууд"}</div>
                    <div class="col-span-2"><strong>Хэрэглэгдэхүүн:</strong> ${res.tools || "Сурах бичиг, үзүүлэн материал"}</div>
                </div>

                <table class="w-full border-collapse border-[2px] border-black text-[12px]">
                    <thead>
                        <tr class="bg-gray-100 uppercase">
                            <th class="border-[2px] border-black p-2 w-[15%] text-center">Алхам</th>
                            <th class="border-[2px] border-black p-2 w-[8%] text-center">Хугацаа</th>
                            <th class="border-[2px] border-black p-2 w-[35%] text-center">Багшийн үйл ажиллагаа</th>
                            <th class="border-[2px] border-black p-2 w-[30%] text-center">Сурагчийн үйл ажиллагаа</th>
                            <th class="border-[2px] border-black p-2 w-[12%] text-center">Материал</th>
                        </tr>
                    </thead>
                    <tbody>`;

        if (res.plan && Array.isArray(res.plan)) {
            res.plan.forEach(item => {
                html += `
                    <tr>
                        <td class="border border-black p-3 font-bold bg-gray-50 italic text-center">${item.step}</td>
                        <td class="border border-black p-3 text-center font-bold">${item.time} мин</td>
                        <td class="border border-black p-3 text-justify leading-relaxed">${item.teacher}</td>
                        <td class="border border-black p-3 text-justify leading-relaxed">${item.student}</td>
                        <td class="border border-black p-3 text-center italic text-[10px]">${item.resource || "Сурах бичиг"}</td>
                    </tr>`;
            });
        }

        html += `
                    </tbody>
                </table>

                <div class="mt-6 border-[2px] border-black p-4 bg-orange-50 italic">
                    <p class="font-bold underline mb-2 text-sm">Гэрийн даалгавар /Үнэлгээ/:</p>
                    <p class="text-[13px]">${res.homework || (res.plan && res.plan.length > 0 ? res.plan[res.plan.length-1].homework : "Сэдвийн хүрээнд дасгал ажиллах")}</p>
                </div>
                
                <div class="mt-8 flex justify-between text-[11px] font-bold">
                    <p>Боловсруулсан багш: ........................... / ${currentUserEmail} /</p>
                </div>
            </div>`;

        document.getElementById('aiResultArea').innerHTML = html;
        document.getElementById('aiResultArea').classList.remove('hidden');
        document.getElementById('downloadBtn').classList.remove('hidden');

        // Эрх хасах (Backend руу мэдээлэх)
        fetch(orderURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "use", email: currentUserEmail }) });
        userCredits--; 
        document.getElementById('displayCredits').innerText = userCredits;

    } catch(e) {
        console.error("Алдаа гарлаа:", e);
        alert("AI хариулт боловсруулахад алдаа гарлаа. Дата формат буруу байна.");
    } finally {
        btn.innerText = "Төлөвлөгөө боловсруулах";
        btn.disabled = false;
    }
}
    // --- ТУСЛАХ ФУНКЦҮҮД ---

    function generateSudoku() {
        const container = document.getElementById('sudokuContainer');
        container.innerHTML = '<p class="p-10 italic">Судоку ачаалж байна...</p>';
        // Судоку логик энд үргэлжилнэ...
    }

        // SUDOKU & OTHERS
        const mongolNumbers = { 1: '᠑', 2: '᠒', 3: '᠓', 4: '᠔', 5: '᠕', 6: '᠖', 7: '᠗', 8: '᠘', 9: '᠙' };
        function isValid(board, r, c, n) {
            for(let x=0; x<9; x++) if(board[r][x]==n || board[x][c]==n) return false;
            let sr=r-r%3, sc=c-c%3;
            for(let i=0; i<3; i++) for(let j=0; j<3; j++) if(board[i+sr][j+sc]==n) return false;
            return true;
        }
        function fillBoard(board) {
            for(let r=0; r<9; r++) for(let c=0; c<9; c++) if(board[r][c]==0) {
                let nums=[1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-0.5);
                for(let n of nums) if(isValid(board,r,c,n)) { board[r][c]=n; if(fillBoard(board)) return true; board[r][c]=0; }
                return false;
            } return true;
        }
        function generateSudoku() {
            let board = Array.from({length:9},()=>Array(9).fill(0));
            fillBoard(board);
            for(let k=0; k<40; k++) board[Math.floor(Math.random()*9)][Math.floor(Math.random()*9)]=0;
            const container = document.getElementById('sudokuContainer');
            container.innerHTML = ''; container.className = "grid grid-cols-9 bg-white border-2 border-orange-900 mx-auto w-fit shadow-lg";
            board.forEach(row => row.forEach(num => {
                const cell = document.createElement('div');
                cell.className = "w-10 h-10 flex items-center justify-center border border-orange-100 font-bold text-xl";
                if(num!=0) { cell.innerText=mongolNumbers[num]; cell.className+=" bg-orange-50 text-orange-900"; }
                else { const input = document.createElement('input'); input.className="w-full h-full text-center outline-none focus:bg-orange-200 text-blue-700"; input.maxLength=1; input.oninput=(e)=>{ if(e.target.value>=1 && e.target.value<=9) e.target.value=mongolNumbers[e.target.value]; else e.target.value=""; }; cell.appendChild(input); }
                container.appendChild(cell);
            }));
        }
        function showSection(name) { document.getElementById('dashboardHome').classList.add('hidden'); document.querySelectorAll('.section-content').forEach(s=>s.classList.remove('active')); document.getElementById(name+'Section').classList.add('active'); if(name==='games') generateSudoku(); }
        function showDashboard() { document.getElementById('dashboardHome').classList.remove('hidden'); document.querySelectorAll('.section-content').forEach(s=>s.classList.remove('active')); }
        function openCheckout(name) { selectedItemName=name; document.getElementById('checkoutModal').classList.add('active'); }
        function closeCheckout() { document.getElementById('checkoutModal').classList.remove('active'); }
        function submitOrder() { fetch(orderURL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:"order", email:currentUserEmail, productName:selectedItemName})}).then(()=>{alert("Илгээгдлээ!"); closeCheckout();}); }
    </script>
