<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сонирхолтой хэл бичиг | Систем</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap');
        body { font-family: 'Manrope', sans-serif; background-color: #fdfaf7; }
        .section-content { display: none; }
        .section-content.active { display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal.active { display: flex; }
        
        /* СУДОКУ СТИЛЬ */
        .sudoku-grid { display: grid; grid-template-columns: repeat(9, 38px); border: 3px solid #4a2c2a; width: fit-content; margin: 20px auto; background-color: #4a2c2a; gap: 1px; }
        .sudoku-cell { width: 38px; height: 38px; background: white; text-align: center; font-size: 20px; font-weight: bold; outline: none; border: none; }
        .cell-fixed { background: #f3f4f6; color: #1f2937; cursor: default; }
        .cell-user { color: #2563eb; cursor: pointer; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="authScreen" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white p-10 rounded-[3rem] shadow-2xl text-center border-t-8 border-orange-800">
            <img src="logo.png" class="w-24 h-24 mx-auto mb-6 object-contain" onerror="this.src='https://via.placeholder.com/100?text=LOGO'">
            <h1 class="text-2xl font-black text-orange-900 mb-6 uppercase italic">Нэвтрэх</h1>
            <input type="email" id="loginEmail" placeholder="Бүртгэлтэй мэйл хаяг" class="w-full p-4 bg-stone-50 border-2 border-orange-100 rounded-2xl outline-none text-center font-bold mb-4">
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-orange-800 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-orange-900 uppercase italic">Нэвтрэх</button>
        </div>
    </div>

    <div id="mainSystem" class="hidden">
        <nav class="bg-white border-b p-4 sticky top-0 z-50">
            <div class="container mx-auto flex justify-between items-center">
                <div onclick="showDashboard()" class="cursor-pointer flex items-center gap-2">
                    <img src="logo.png" class="w-10 h-10 object-contain" onerror="this.src='https://via.placeholder.com/40'">
                    <span class="text-xl font-black text-orange-900 italic uppercase">Туул Багш</span>
                </div>
                <div class="flex items-center gap-4">
                    <div onclick="showSection('cart')" class="cursor-pointer bg-orange-100 p-2 rounded-full relative">
                        🛒 <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
                    </div>
                    <div onclick="showSection('library')" class="cursor-pointer bg-orange-50 px-3 py-1 rounded-full border border-orange-200">
                        <span class="text-xs font-black text-orange-700">📂 Миний сан</span>
                    </div>
                </div>
            </div>
        </nav>

        <div id="dashboardHome" class="container mx-auto px-4 py-8 max-w-6xl text-center">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10 font-black italic text-xs uppercase">
                <div onclick="showSection('planner')" class="bg-orange-600 p-6 rounded-[2rem] text-white cursor-pointer shadow-lg hover:scale-105 transition">Хөтөлбөр</div>
                <div onclick="showSection('exam')" class="bg-blue-600 p-6 rounded-[2rem] text-white cursor-pointer shadow-lg hover:scale-105 transition">Шалгалт</div>
                <div onclick="showSection('games')" class="bg-green-600 p-6 rounded-[2rem] text-white cursor-pointer shadow-lg hover:scale-105 transition">Судоку</div>
                <div onclick="showSection('shop')" class="bg-yellow-500 p-6 rounded-[2rem] text-white cursor-pointer shadow-lg hover:scale-105 transition">Дэлгүүр</div>
            </div>
            <h2 class="text-xl font-black text-orange-900 mb-6 italic uppercase text-left">📚 Шинэ материалууд</h2>
            <div id="materialGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </div>

        <div id="plannerSection" class="section-content container mx-auto max-w-4xl p-4">
            <button onclick="showDashboard()" class="text-orange-800 font-bold mb-4 uppercase">← Буцах</button>
            <div class="bg-white p-8 rounded-[3rem] shadow-xl">
                <h2 class="text-xl font-black mb-4 uppercase">AI Хичээлийн төлөвлөгөө</h2>
                <input type="text" id="lessonTopic" placeholder="Сэдвээ бичнэ үү..." class="w-full p-4 border rounded-xl mb-4 bg-gray-50">
                <button onclick="generateAI('planner')" id="planBtn" class="w-full bg-orange-800 text-white py-4 rounded-xl font-black">БОЛОВСРУУЛАХ (1 эрх)</button>
                <div id="planResult" class="mt-6 p-4 border rounded-xl bg-gray-50 hidden whitespace-pre-wrap text-sm leading-relaxed"></div>
            </div>
        </div>

        <div id="examSection" class="section-content container mx-auto max-w-4xl p-4">
            <button onclick="showDashboard()" class="text-blue-800 font-bold mb-4 uppercase">← Буцах</button>
            <div class="bg-white p-8 rounded-[3rem] shadow-xl">
                <h2 class="text-xl font-black mb-4 uppercase text-blue-900">Шалгалт боловсруулах</h2>
                <input type="text" id="examTopic" placeholder="Шалгалтын сэдэв..." class="w-full p-4 border rounded-xl mb-4 bg-gray-50">
                <button onclick="generateAI('exam')" id="examBtn" class="w-full bg-blue-800 text-white py-4 rounded-xl font-black">ШАЛГАЛТ БЭЛДЭХ (2 эрх)</button>
                <div id="examResult" class="mt-6 p-4 border rounded-xl bg-gray-50 hidden whitespace-pre-wrap text-sm"></div>
            </div>
        </div>

        <div id="gamesSection" class="section-content container mx-auto p-4 text-center">
            <button onclick="showDashboard()" class="block text-left font-bold text-green-800 mb-4 uppercase">← Буцах</button>
            <div class="bg-white p-8 rounded-[3rem] shadow-xl inline-block border-t-8 border-green-700">
                <h2 class="text-xl font-black text-green-900 mb-4 uppercase">Үндэсний бичгийн тоон судоку</h2>
                <div id="sudokuContainer" class="sudoku-grid"></div>
                <button onclick="initSudoku()" class="bg-green-700 text-white px-8 py-3 rounded-xl font-bold uppercase shadow-lg">Шинэ тоглоом</button>
            </div>
        </div>

        <div id="cartSection" class="section-content container mx-auto px-4 py-8 max-w-2xl">
            <button onclick="showDashboard()" class="font-bold text-orange-800 mb-6 uppercase">← Буцах</button>
            <h2 class="text-2xl font-black text-orange-900 mb-6 uppercase">🛒 Миний сагс</h2>
            <div id="cartItems" class="space-y-4 mb-8"></div>
            <div id="cartTotal" class="text-xl font-black text-right border-t pt-4 text-orange-900"></div>
            <button onclick="openPayment('Сагс - Нийт')" id="cartPayBtn" class="hidden w-full bg-orange-800 text-white py-4 rounded-2xl font-black mt-6 shadow-xl uppercase">Худалдан авах</button>
        </div>

        <div id="shopSection" class="section-content container mx-auto px-4 py-8">
            <button onclick="showDashboard()" class="font-bold text-orange-800 mb-6 uppercase">← Буцах</button>
            <div id="fullShopGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>
    </div>

    <div id="imageModal" class="modal" onclick="this.classList.remove('active')">
        <img id="modalImg" src="" class="max-w-full max-h-[90vh] rounded-xl border-4 border-white shadow-2xl">
    </div>

    <div id="paymentModal" class="modal" onclick="if(event.target==this) closePayment()">
        <div class="bg-white p-8 rounded-[3rem] max-w-sm w-full text-center relative border-8 border-orange-50">
            <h2 class="text-xl font-black text-orange-900 mb-4 uppercase italic">Төлбөр төлөх</h2>
            <p id="selectedItem" class="text-xs font-bold text-orange-700 mb-4"></p>
            <div class="bg-gray-100 p-4 rounded-2xl mb-4">
                <img src="qr.png" class="w-48 h-48 mx-auto rounded-lg shadow-md" onerror="this.src='https://via.placeholder.com/200?text=QR+Code'">
                <p class="mt-2 text-[10px] font-bold text-gray-500 uppercase">Хас Банк: 5006069631</p>
            </div>
            <div class="text-left text-[10px] bg-orange-50 p-4 rounded-xl mb-6">
                <p class="font-bold text-gray-400 uppercase">Гүйлгээний утга:</p>
                <p id="paymentNote" class="text-sm font-black text-orange-800"></p>
            </div>
            <button onclick="confirmOrder()" class="w-full bg-orange-800 text-white py-4 rounded-xl font-black uppercase">Төлсөн, хүсэлт илгээх</button>
        </div>
    </div>

<script>
    const orderURL = 'https://script.google.com/macros/s/AKfycbwCCzxtGfH9dCiXO2UHtkb0Vq_4v741L1OlBWyrhDXQ1HbvB-90Y6Ye355W06qxHhAAJA/exec';
    const RENDER_API_URL = 'https://sonirholtoi-hel-bichig.onrender.com/chat';
    const mongolNums = { '1': '᠑', '2': '᠒', '3': '᠓', '4': '᠔', '5': '᠕', '6': '᠖', '7': '᠗', '8': '᠘', '9': '᠙', '0': '' };
    
    let currentUserEmail = "";
    let currentItem = "";
    let cart = [];
    let productsData = [];

    // 1. НЭВТРЭХ
    async function handleLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        if(!email) return alert("Мэйл хаягаа оруулна уу!");
        const btn = document.getElementById('loginBtn');
        btn.innerText = "Уншиж байна..."; btn.disabled = true;
        try {
            const res = await fetch(`${orderURL}?action=check&email=${encodeURIComponent(email)}`);
            const data = await res.json();
            if (data.status === "success") {
                currentUserEmail = email;
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainSystem').classList.remove('hidden');
                document.getElementById('displayEmail').innerText = email;
                loadProducts();
            } else { alert("Бүртгэлгүй байна!"); }
        } catch (e) { alert("Сервертэй холбогдож чадсангүй."); }
        finally { btn.innerText = "Нэвтрэх"; btn.disabled = false; }
    }

    // 2. ДЭЛГҮҮР & САГС
    async function loadProducts() {
        const res = await fetch(`${orderURL}?action=getProducts`);
        productsData = await res.json();
        const render = (p) => `
            <div class="bg-white p-4 rounded-[2rem] shadow-lg flex flex-col border border-orange-50">
                <img src="${fixImg(p.Images)}" onclick="viewImage('${fixImg(p.Images)}')" class="w-full h-40 object-cover rounded-xl mb-4 cursor-pointer hover:opacity-80 transition" onerror="this.src='https://via.placeholder.com/300'">
                <h3 class="font-black text-xs text-orange-900 mb-2 h-8 overflow-hidden">${p.Title}</h3>
                <p class="font-bold text-orange-600 mb-4">${Number(p.Price).toLocaleString()}₮</p>
                <div class="grid grid-cols-1 gap-2 mt-auto">
                    <button onclick="viewImage('${fixImg(p.Images)}')" class="text-[10px] bg-gray-100 py-2 rounded-lg font-bold uppercase">👁 Харах</button>
                    <button onclick="addToCart('${p.Title}')" class="text-[10px] bg-orange-100 text-orange-800 py-2 rounded-lg font-bold uppercase">🛒 Сагслах</button>
                    <button onclick="openPayment('${p.Title}')" class="text-[10px] bg-orange-800 text-white py-2 rounded-lg font-bold uppercase">💳 Худалдан авах</button>
                </div>
            </div>`;
        const html = productsData.map(render).join('');
        document.getElementById('materialGrid').innerHTML = html;
        document.getElementById('fullShopGrid').innerHTML = html;
    }

    function fixImg(url) {
        if (!url) return '';
        if (!url.startsWith('http')) return `https://raw.githubusercontent.com/tuult764-crypto/sonirholtoi-hel-bichig-/main/${url}`;
        return url;
    }

    function viewImage(src) {
        document.getElementById('modalImg').src = src;
        document.getElementById('imageModal').classList.add('active');
    }

    function addToCart(title) {
        const prod = productsData.find(p => p.Title === title);
        cart.push(prod);
        updateCartUI();
        alert("Сагсанд нэмэгдлээ!");
    }

    function updateCartUI() {
        document.getElementById('cartCount').innerText = cart.length;
        const total = cart.reduce((sum, p) => sum + Number(p.Price), 0);
        document.getElementById('cartItems').innerHTML = cart.map((p, idx) => `
            <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border">
                <span class="text-xs font-bold text-orange-900">${p.Title}</span>
                <button onclick="cart.splice(${idx},1); updateCartUI();" class="text-red-500">❌</button>
            </div>`).join('');
        document.getElementById('cartTotal').innerText = `Нийт: ${total.toLocaleString()}₮`;
        document.getElementById('cartPayBtn').classList.toggle('hidden', cart.length === 0);
    }

    // 3. ТӨЛБӨР
    function openPayment(title) {
        currentItem = title;
        document.getElementById('selectedItem').innerText = title;
        document.getElementById('paymentNote').innerText = currentUserEmail;
        document.getElementById('paymentModal').classList.add('active');
    }

    function closePayment() { document.getElementById('paymentModal').classList.remove('active'); }

    function confirmOrder() {
        fetch(orderURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "order", email: currentUserEmail, productName: currentItem }) });
        alert("Хүсэлт илгээгдлээ. Төлбөр шалгасны дараа таны сан хэсэгт файл нэмэгдэх болно.");
        closePayment();
    }

    // 4. СУДОКУ (МОНГОЛ ТОГООР)
    function initSudoku() {
        const container = document.getElementById('sudokuContainer');
        container.innerHTML = "";
        const board = [
            [5,3,0,0,7,0,0,0,0], [6,0,0,1,9,5,0,0,0], [0,9,8,0,0,0,0,6,0],
            [8,0,0,0,6,0,0,0,3], [4,0,0,8,0,3,0,0,1], [7,0,0,0,2,0,0,0,6],
            [0,6,0,0,0,0,2,8,0], [0,0,0,4,1,9,0,0,5], [0,0,0,0,8,0,0,7,9]
        ];
        board.flat().forEach(val => {
            const input = document.createElement('input');
            input.className = "sudoku-cell";
            input.value = mongolNums[val] || "";
            if(val !== 0) {
                input.readOnly = true; input.classList.add('cell-fixed');
            } else {
                input.classList.add('cell-user');
                input.addEventListener('input', (e) => {
                    const char = e.data;
                    if(mongolNums[char]) e.target.value = mongolNums[char];
                    else if(!Object.values(mongolNums).includes(e.target.value)) e.target.value = "";
                });
            }
            container.appendChild(input);
        });
    }

    // 5. AI ФУНКЦҮҮД
    async function generateAI(type) {
        const topic = type === 'planner' ? document.getElementById('lessonTopic').value : document.getElementById('examTopic').value;
        const resArea = type === 'planner' ? document.getElementById('planResult') : document.getElementById('examResult');
        const btn = type === 'planner' ? document.getElementById('planBtn') : document.getElementById('examBtn');
        if(!topic) return alert("Сэдвээ оруулна уу!");
        
        btn.innerText = "AI боловсруулж байна..."; btn.disabled = true;
        resArea.classList.remove('hidden'); resArea.innerText = "Түр хүлээнэ үү (60 сек хүртэл)...";

        try {
            const prompt = type === 'planner' 
                ? `Монгол хэлний багшид зориулсан "${topic}" сэдэвтэй ээлжит хичээлийн төлөвлөгөөг боловсруул.`
                : `"${topic}" сэдвээр Монгол хэл, Уран зохиол, Үндэсний бичиг хосолсон шалгалт бэлтгэ.`;
            
            const res = await fetch(RENDER_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });
            const data = await res.json();
            resArea.innerText = data.reply || data.content || "AI хариу өгсөнгүй.";
        } catch (e) { resArea.innerText = "Сервер ачаалж байна, дахин оролдоно уу."; }
        finally { btn.innerText = (type === 'planner' ? "БОЛОВСРУУЛАХ (1 эрх)" : "ШАЛГАЛТ БЭЛДЭХ (2 эрх)"); btn.disabled = false; }
    }

    function showSection(name) {
        document.getElementById('dashboardHome').classList.add('hidden');
        document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
        document.getElementById(name + 'Section').classList.add('active');
        if(name === 'games') initSudoku();
    }
    function showDashboard() {
        document.getElementById('dashboardHome').classList.remove('hidden');
        document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
    }
</script>
</body>
</html>
