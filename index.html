<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сонирхолтой хэл бичиг | Систем</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap');
        body { font-family: 'Manrope', sans-serif; background-color: #fdfaf7; }
        .section-content { display: none; }
        .section-content.active { display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .shop-card { background: white; border-radius: 1.5rem; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s; }
        .shop-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="authScreen" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white p-10 rounded-[3rem] shadow-2xl text-center border-t-8 border-orange-800">
            <img src="logo.png" class="w-24 h-24 mx-auto mb-6 object-contain" onerror="this.src='https://via.placeholder.com/100?text=LOGO'">
            <h1 class="text-2xl font-black text-orange-900 mb-6 uppercase italic">Нэвтрэх</h1>
            <input type="email" id="loginEmail" placeholder="Бүртгэлтэй мэйл хаяг" class="w-full p-4 bg-stone-50 border-2 border-orange-100 rounded-2xl outline-none text-center font-bold mb-4">
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-orange-800 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-orange-900 uppercase italic">Нэвтрэх</button>
        </div>
    </div>

    <div id="mainSystem" class="hidden">
        <nav class="bg-white border-b p-4 sticky top-0 z-50">
            <div class="container mx-auto flex justify-between items-center">
                <div onclick="showDashboard()" class="cursor-pointer flex items-center gap-2">
                    <img src="logo.png" class="w-10 h-10 object-contain" onerror="this.src='https://via.placeholder.com/40'">
                    <span class="text-xl font-black text-orange-900 italic">ТУУЛ БАГШИЙН-ЦАХИМ ДЭЛГҮҮР</span>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p class="text-[10px] font-bold text-gray-400" id="displayEmail"></p>
                        <div onclick="showSection('library')" class="cursor-pointer bg-orange-50 px-3 py-1 rounded-full border border-orange-200">
                            <span class="text-xs font-black text-orange-700 uppercase italic">📂 Миний сан</span>
                            <p class="text-[10px] font-black text-orange-600">ЭРХ: <span id="displayCredits">0</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <div id="dashboardHome" class="container mx-auto px-4 py-8 max-w-6xl">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10 text-center font-black italic text-xs uppercase">
                <div onclick="showSection('planner')" class="bg-orange-600 p-6 rounded-[2rem] text-white cursor-pointer shadow-lg">Хөтөлбөр</div>
                <div onclick="showSection('exam')" class="bg-blue-600 p-6 rounded-[2rem] text-white cursor-pointer shadow-lg">Шалгалт</div>
                <div onclick="showSection('games')" class="bg-green-600 p-6 rounded-[2rem] text-white cursor-pointer shadow-lg">Судоку</div>
                <div onclick="showSection('shop')" class="bg-yellow-500 p-6 rounded-[2rem] text-white cursor-pointer shadow-lg">Дэлгүүр</div>
            </div>

            <h2 class="text-xl font-black text-orange-900 mb-6 italic uppercase">📚 Шинэ материалууд</h2>
            <div id="materialGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </div>

        <div id="librarySection" class="section-content container mx-auto px-4 py-8">
            <button onclick="showDashboard()" class="font-bold text-orange-800 mb-6 uppercase">← Буцах</button>
            <h2 class="text-2xl font-black text-orange-900 mb-6 uppercase italic">📂 Миний худалдаж авсан файлууд</h2>
            <div id="ownedFiles" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-gray-400 italic">Одоогоор файл байхгүй байна.</p>
            </div>
        </div>

        <div id="shopSection" class="section-content container mx-auto px-4 py-8">
            <button onclick="showDashboard()" class="font-bold text-orange-800 mb-6 uppercase">← Буцах</button>
            <h2 class="text-2xl font-black text-orange-900 mb-6 uppercase italic">🛒 Бүх материалууд</h2>
            <div id="fullShopGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </div>
    </div>

    <div id="paymentModal" class="modal" onclick="if(event.target==this) closePayment()">
        <div class="bg-white p-8 rounded-[3rem] max-w-sm w-full text-center relative border-8 border-orange-50">
            <h2 class="text-xl font-black text-orange-900 mb-4 uppercase italic">Төлбөр төлөх</h2>
            <p id="selectedItem" class="text-sm font-bold text-orange-700 mb-4"></p>
            
            <div class="bg-gray-100 p-4 rounded-2xl mb-4">
                <img src="qr.png" class="w-48 h-48 mx-auto rounded-lg shadow-md" alt="Төлбөрийн QR" onerror="this.src='https://via.placeholder.com/200?text=QR+Code'">
                <p class="mt-2 text-[10px] font-bold text-gray-500 uppercase">Хас Банк: 5006069631</p>
            </div>

            <div class="text-left text-[10px] bg-orange-50 p-4 rounded-xl mb-6">
                <p class="font-bold text-gray-400">ГҮЙЛГЭЭНИЙ УТГА:</p>
                <p id="paymentNote" class="text-sm font-black text-orange-800"></p>
            </div>

            <button onclick="confirmOrder()" class="w-full bg-orange-800 text-white py-4 rounded-xl font-black uppercase shadow-lg">Төлсөн, хүсэлт илгээх</button>
            <button onclick="closePayment()" class="mt-4 text-xs font-bold text-gray-400 uppercase underline">Хаах</button>
        </div>
    </div>

    <script>
        const orderURL = 'https://script.google.com/macros/s/AKfycbwCCzxtGfH9dCiXO2UHtkb0Vq_4v741L1OlBWyrhDXQ1HbvB-90Y6Ye355W06qxHhAAJA/exec';
        let currentUserEmail = "";
        let currentItem = "";

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            if(!email) return alert("Мэйл хаягаа оруулна уу!");
            const btn = document.getElementById('loginBtn');
            btn.innerText = "Уншиж байна...";
            try {
                const res = await fetch(`${orderURL}?action=check&email=${encodeURIComponent(email)}`);
                const data = await res.json();
                if (data.status === "success") {
                    currentUserEmail = email;
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('mainSystem').classList.remove('hidden');
                    document.getElementById('displayEmail').innerText = email;
                    document.getElementById('displayCredits').innerText = data.credits;
                    loadProducts();
                } else { alert("Бүртгэлгүй байна!"); }
            } catch (e) { alert("Холболтын алдаа!"); }
            finally { btn.innerText = "Нэвтрэх"; }
        }

        function fixImg(url) {
            if (!url) return 'https://via.placeholder.com/300';
            if (!url.startsWith('http')) return `https://raw.githubusercontent.com/tuult764-crypto/sonirholtoi-hel-bichig-/main/${url}`;
            return url;
        }

        async function loadProducts() {
            const res = await fetch(`${orderURL}?action=getProducts`);
            const products = await res.json();
            const html = products.map(p => `
                <div class="shop-card">
                    <img src="${fixImg(p.Images)}" class="w-full h-40 object-cover rounded-xl mb-4" onerror="this.src='https://via.placeholder.com/300'">
                    <h3 class="font-black text-xs h-8 overflow-hidden text-orange-900">${p.Title}</h3>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-orange-600 font-bold">${Number(p.Price).toLocaleString()}₮</span>
                        <button onclick="openPayment('${p.Title}')" class="bg-orange-800 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase">Авах</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('materialGrid').innerHTML = html;
            document.getElementById('fullShopGrid').innerHTML = html;
        }

        function openPayment(title) {
            currentItem = title;
            document.getElementById('selectedItem').innerText = title;
            document.getElementById('paymentNote').innerText = currentUserEmail;
            document.getElementById('paymentModal').classList.add('active');
        }

        function closePayment() {
            document.getElementById('paymentModal').classList.remove('active');
        }

        function confirmOrder() {
            fetch(orderURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "order", email: currentUserEmail, productName: currentItem })
            });
            alert("Хүсэлт илгээгдлээ. Төлбөр шалгасны дараа таны сан хэсэгт файл нэмэгдэх болно.");
            closePayment();
        }

        function showSection(name) {
            document.getElementById('dashboardHome').classList.add('hidden');
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.getElementById(name + 'Section').classList.add('active');
        }

        function showDashboard() {
            document.getElementById('dashboardHome').classList.remove('hidden');
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
        }
    </script>
</body>
</html>
