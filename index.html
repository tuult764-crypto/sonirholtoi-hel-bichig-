<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сонирхолтой хэл бичиг | Систем</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap');
        body { font-family: 'Manrope', sans-serif; background-color: #fdfaf7; }
        .section-content { display: none; }
        .section-content.active { display: block; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .product-card { flex: 0 0 280px; snap-align: start; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal.active { display: flex; }
        /* Судоку загвар */
        #sudokuContainer div { border: 0.5px solid #e5e7eb; }
        #sudokuContainer div:nth-child(3n) { border-right: 2px solid #854d0e; }
        #sudokuContainer div:nth-child(9n) { border-right: 0.5px solid #e5e7eb; }
        #sudokuContainer div:nth-of-type(n+19):nth-of-type(-n+27),
        #sudokuContainer div:nth-of-type(n+46):nth-of-type(-n+54) { border-bottom: 2px solid #854d0e; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="authScreen" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white p-10 rounded-[3rem] shadow-2xl border border-orange-100 text-center">
            <h1 class="text-2xl font-black text-orange-900 mb-2 uppercase italic">Сонирхолтой хэл бичиг</h1>
            <input type="email" id="loginEmail" placeholder="Мэйл хаягаа оруулна уу" class="w-full p-4 bg-stone-50 border rounded-2xl outline-none text-center font-bold mb-4 shadow-inner">
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-orange-800 text-white py-4 rounded-2xl font-black shadow-lg uppercase italic">Нэвтрэх</button>
        </div>
    </div>

    <div id="mainSystem" class="hidden">
        <nav class="bg-white border-b p-4 sticky top-0 z-50 shadow-sm">
            <div class="container mx-auto flex justify-between items-center px-4">
                <div onclick="showDashboard()" class="flex items-center gap-2 cursor-pointer">
                    <span class="text-lg font-black text-orange-900 italic uppercase underline">Туул багш</span>
                </div>
                <div class="text-right">
                    <p id="displayEmail" class="text-[10px] font-bold text-gray-400 italic"></p>
                    <p class="text-xs font-black text-orange-600 uppercase">ЭРХ: <span id="displayCredits">0</span></p>
                </div>
            </div>
        </nav>

        <div id="dashboardHome" class="container mx-auto px-4 py-10 max-w-6xl text-center">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
                <div onclick="showSection('planner')" class="bg-white p-6 rounded-[2rem] border-b-8 border-orange-200 hover:border-orange-800 transition-all cursor-pointer shadow-sm">
                    <h3 class="font-black text-sm italic uppercase">📝 Хөтөлбөр</h3>
                </div>
                <div onclick="showSection('exam')" class="bg-white p-6 rounded-[2rem] border-b-8 border-blue-200 hover:border-blue-800 transition-all cursor-pointer shadow-sm">
                    <h3 class="font-black text-sm italic uppercase">📄 Шалгалт</h3>
                </div>
                <div onclick="showSection('games')" class="bg-white p-6 rounded-[2rem] border-b-8 border-green-200 hover:border-green-800 transition-all cursor-pointer shadow-sm">
                    <h3 class="font-black text-sm italic uppercase">🧩 Судоку</h3>
                </div>
                <div onclick="showSection('shop')" class="bg-white p-6 rounded-[2rem] border-b-8 border-yellow-200 hover:border-yellow-800 transition-all cursor-pointer shadow-sm">
                    <h3 class="font-black text-sm italic uppercase">🛒 Дэлгүүр</h3>
                </div>
            </div>
            
            <div class="mt-12 text-left">
                <h2 class="text-xl font-bold text-orange-900 mb-4 italic px-2">📚 Сургалтын материалууд</h2>
                <div id="materialGrid" class="flex overflow-x-auto pb-6 gap-4 snap-x snap-mandatory scrollbar-hide"></div>
            </div>
        </div>

        <div id="plannerSection" class="section-content container mx-auto max-w-4xl px-4 py-6">
            <div class="bg-white p-8 rounded-[3rem] shadow-xl border border-orange-50">
                <button onclick="showDashboard()" class="text-sm font-bold text-orange-800 mb-6 italic">← БУЦАХ</button>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <input type="text" id="lessonTopic" placeholder="Хичээлийн сэдэв..." class="p-4 border rounded-2xl bg-stone-50 font-bold outline-none italic">
                    <select id="gradeSelect" class="p-4 border rounded-2xl bg-stone-50 font-bold outline-none text-orange-800">
                        <option value="6-р анги">6-р анги</option>
                        <option value="7-р анги">7-р анги</option>
                        <option value="8-р анги">8-р анги</option>
                        <option value="9-р анги">9-р анги</option>
                    </select>
                </div>
                <button onclick="generateAIPlan()" id="genBtn" class="w-full bg-orange-800 text-white py-5 rounded-2xl font-black uppercase shadow-lg italic">Төлөвлөгөө боловсруулах (1 эрх)</button>
                <div id="aiResultArea" class="hidden mt-8 overflow-x-auto"></div>
                <button id="downloadBtn" onclick="downloadPlannerPDF()" class="hidden w-full mt-4 bg-green-600 text-white py-5 rounded-2xl font-black italic uppercase">📥 PDF ТАТАХ</button>
            </div>
        </div>

        <div id="examSection" class="section-content container mx-auto max-w-4xl px-4 py-6">
            <div class="bg-white p-8 rounded-[3rem] shadow-xl border border-blue-50">
                <button onclick="showDashboard()" class="text-sm font-bold text-blue-800 mb-6 italic">← БУЦАХ</button>
                <h2 class="text-2xl font-black text-blue-900 mb-6 italic uppercase underline">Шалгалтын материал</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <select id="examGrade" class="p-4 border rounded-2xl bg-blue-50 font-bold outline-none">
                        <option value="6-р анги">6-р анги</option>
                        <option value="7-р анги">7-р анги</option>
                        <option value="8-р анги">8-р анги</option>
                        <option value="9-р анги">9-р анги</option>
                    </select>
                    <input type="text" id="examTopic" placeholder="Шалгалтын сэдэв..." class="p-4 border rounded-2xl bg-blue-50 font-bold outline-none">
                </div>
                <button onclick="generateExamMaterial()" id="examGenBtn" class="w-full bg-blue-800 text-white py-5 rounded-2xl font-black uppercase shadow-lg italic">Шалгалт боловсруулах (2 эрх)</button>
                <div id="examResultArea" class="hidden mt-8"></div>
                <div id="examDownloadButtons" class="hidden mt-4">
                    <button onclick="downloadExamWord()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase">Word татах</button>
                </div>
            </div>
        </div>

        <div id="gamesSection" class="section-content container mx-auto max-w-4xl px-4 py-6 text-center">
             <div class="bg-white p-10 rounded-[3rem] shadow-xl border-4 border-green-100">
                <button onclick="showDashboard()" class="text-sm font-bold text-green-800 mb-6 italic">← БУЦАХ</button>
                <h2 class="text-2xl font-black text-green-900 mb-6 uppercase italic">Үндэсний бичгийн судоку</h2>
                <div id="sudokuContainer" class="flex justify-center mb-8 italic"></div>
                <button onclick="generateSudoku()" class="bg-green-700 text-white px-10 py-5 rounded-2xl font-black italic uppercase">Шинэ тоглоом</button>
            </div>
        </div>

        <div id="shopSection" class="section-content px-4 py-10 container mx-auto text-center">
            <button onclick="showDashboard()" class="text-sm font-bold text-orange-800 mb-6 italic">← БУЦАХ</button>
            <div id="shopGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8 text-left"></div>
        </div>
    </div>

    <div id="checkoutModal" class="modal" onclick="if(event.target==this) closeCheckout()">
        <div class="bg-white p-10 rounded-[3rem] max-w-md w-full text-center border-8 border-orange-100">
            <h2 class="text-2xl font-black text-orange-900 mb-6 uppercase italic">Төлбөр төлөх</h2>
            <div class="bg-orange-50 p-6 rounded-3xl border mb-6 text-left">
                <p class="font-black text-gray-400 text-sm italic">ХАС БАНК / 5006069631</p>
                <p class="font-black text-orange-900 text-xl">МӨНХДАЛАЙ ТУУЛ</p>
                <p class="mt-4 text-[10px] text-gray-500 italic uppercase">Гүйлгээний утга: <span id="payEmail" class="text-orange-700 font-bold"></span></p>
            </div>
            <button onclick="submitOrder()" class="w-full bg-orange-800 text-white py-5 rounded-2xl font-black uppercase shadow-lg">Илгээх</button>
        </div>
    </div>

<script>
    const orderURL = 'https://script.google.com/macros/s/AKfycbwCCzxtGfH9dCiXO2UHtkb0Vq_4v741L1OlBWyrhDXQ1HbvB-90Y6Ye355W06qxHhAAJA/exec';
    const RENDER_API_URL = 'https://sonirholtoi-hel-bichig.onrender.com/chat';
    
    let currentUserEmail = ""; 
    let userCredits = 0;
    let selectedItemName = "";

    // 1. НЭВТРЭХ
    async function handleLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        if (!email) return alert("Мэйл хаягаа оруулна уу!");
        const btn = document.getElementById('loginBtn');
        btn.innerText = "Шалгаж байна...";
        
        try {
            const res = await fetch(`${orderURL}?action=check&email=${encodeURIComponent(email)}`);
            const data = await res.json();
            if (data.status === "success") {
                currentUserEmail = email;
                userCredits = data.credits;
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainSystem').classList.remove('hidden');
                document.getElementById('displayEmail').innerText = email;
                document.getElementById('displayCredits').innerText = userCredits;
                document.getElementById('payEmail').innerText = email;
                loadProducts();
            } else { alert("Бүртгэлгүй мэйл!"); }
        } catch (e) { alert("Алдаа гарлаа."); }
        finally { btn.innerText = "Нэвтрэх"; }
    }

    // 2. БАРАА АЧААЛАХ
    async function loadProducts() {
        const grid = document.getElementById('materialGrid');
        try {
            const res = await fetch(`${orderURL}?action=getProducts`);
            const products = await res.json();
            grid.innerHTML = products.map(p => `
                <div class="product-card bg-white p-4 rounded-[2rem] shadow-lg border border-orange-50">
                    <img src="${p.Images || 'https://via.placeholder.com/300'}" class="w-full h-40 object-cover rounded-2xl mb-4">
                    <h3 class="font-black text-orange-900 text-sm h-10 overflow-hidden mb-2">${p.Title}</h3>
                    <div class="flex justify-between items-center">
                        <span class="text-orange-600 font-black">${Number(p.Price).toLocaleString()}₮</span>
                        <button onclick="openCheckout('${p.Title}')" class="bg-orange-800 text-white px-4 py-2 rounded-xl text-[10px] font-bold">АВАХ</button>
                    </div>
                </div>
            `).join('');
        } catch (e) { grid.innerHTML = "Ачаалж чадсангүй."; }
    }

    // 3. ХӨТӨЛБӨР БОЛОВСРУУЛАХ
    async function generateAIPlan() {
        if(userCredits < 1) return alert("Эрх хүрэлцэхгүй байна!");
        const topic = document.getElementById('lessonTopic').value;
        const grade = document.getElementById('gradeSelect').value;
        if(!topic) return alert("Сэдвээ оруулна уу!");

        const btn = document.getElementById('genBtn');
        btn.innerText = "AI Боловсруулж байна...";
        btn.disabled = true;

        const prompt = `Монгол хэлний багш. ${grade}-ийн "${topic}" сэдвээр Medle.mn загварын хичээлийн төлөвлөгөөг JSON-оор өг (goal, method, plan:[{step, time, teacher, student}]).`;

        try {
            const response = await fetch(RENDER_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });
            const data = await response.json();
            
            let html = `
                <div id="printArea" class="p-8 bg-white border-2 border-black text-black text-left">
                    <h1 class="text-center font-bold underline mb-4 uppercase">Хичээлийн хөтөлбөр</h1>
                    <p><b>Анги:</b> ${grade} | <b>Сэдэв:</b> ${topic}</p>
                    <p><b>Зорилго:</b> ${data.goal || "..."}</p>
                    <table class="w-full border-collapse border border-black mt-4 text-[12px]">
                        <tr class="bg-gray-100">
                            <th class="border border-black p-1">Алхам</th>
                            <th class="border border-black p-1">Хугацаа</th>
                            <th class="border border-black p-1">Багш</th>
                            <th class="border border-black p-1">Сурагч</th>
                        </tr>
                        ${data.plan.map(i => `<tr>
                            <td class="border border-black p-1 font-bold">${i.step}</td>
                            <td class="border border-black p-1">${i.time}</td>
                            <td class="border border-black p-1">${i.teacher}</td>
                            <td class="border border-black p-1">${i.student}</td>
                        </tr>`).join('')}
                    </table>
                </div>`;
            document.getElementById('aiResultArea').innerHTML = html;
            document.getElementById('aiResultArea').classList.remove('hidden');
            document.getElementById('downloadBtn').classList.remove('hidden');

            userCredits--;
            document.getElementById('displayCredits').innerText = userCredits;
            fetch(`${orderURL}?action=use&email=${currentUserEmail}&amount=1`, {mode:'no-cors'});
        } catch(e) { alert("Алдаа гарлаа."); }
        finally { btn.innerText = "Төлөвлөгөө боловсруулах"; btn.disabled = false; }
    }

    // 4. ШАЛГАЛТ БОЛОВСРУУЛАХ
    async function generateExamMaterial() {
        if(userCredits < 2) return alert("Эрх хүрэлцэхгүй байна! (2 эрх шаардлагатай)");
        const topic = document.getElementById('examTopic').value;
        const grade = document.getElementById('examGrade').value;
        if(!topic) return alert("Сэдвээ оруулна уу!");

        const btn = document.getElementById('examGenBtn');
        btn.innerText = "AI Боловсруулж байна...";
        btn.disabled = true;

        const prompt = `Монгол хэлний багш. ${grade}-ийн "${topic}" сэдвээр 5 сонгох, 2 задгай асуулттай шалгалт, хариултын хамт HTML-ээр өг.`;

        try {
            const res = await fetch(RENDER_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });
            const data = await res.json();
            const content = data.content || (data.choices ? data.choices[0].message.content : data);

            document.getElementById('examResultArea').innerHTML = `
                <div id="examPrintArea" class="p-8 bg-white border border-gray-200 text-black text-left">
                    <h2 class="text-center font-bold underline mb-4 uppercase">Шалгалтын материал: ${topic}</h2>
                    <div class="prose max-w-none text-sm">${content.replace(/\n/g, '<br>')}</div>
                </div>`;
            document.getElementById('examResultArea').classList.remove('hidden');
            document.getElementById('examDownloadButtons').classList.remove('hidden');

            userCredits -= 2;
            document.getElementById('displayCredits').innerText = userCredits;
            fetch(`${orderURL}?action=use&email=${currentUserEmail}&amount=2`, {mode:'no-cors'});
        } catch(e) { alert("Алдаа гарлаа."); }
        finally { btn.innerText = "Шалгалт боловсруулах (2 эрх)"; btn.disabled = false; }
    }

    // 5. PDF / WORD ТАТАХ
    function downloadPlannerPDF() {
        const element = document.getElementById('printArea');
        html2pdf().from(element).save('hotolbor.pdf');
    }

    function downloadExamWord() {
        const html = document.getElementById('examPrintArea').innerHTML;
        const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'shalgalt.doc'; a.click();
    }

    // 6. СУДОКУ (Зөв ажилладаг)
    const mongolNums = {1:'᠑', 2:'᠒', 3:'᠓', 4:'᠔', 5:'᠕', 6:'᠖', 7:'᠗', 8:'᠘', 9:'᠙'};
    function generateSudoku() {
        const container = document.getElementById('sudokuContainer');
        container.innerHTML = "";
        container.className = "grid grid-cols-9 bg-white border-2 border-orange-900 mx-auto w-fit";
        
        // Жишээ 9x9 судоку загвар
        const board = [
            [5,3,0,0,7,0,0,0,0], [6,0,0,1,9,5,0,0,0], [0,9,8,0,0,0,0,6,0],
            [8,0,0,0,6,0,0,0,3], [4,0,0,8,0,3,0,0,1], [7,0,0,0,2,0,0,0,6],
            [0,6,0,0,0,0,2,8,0], [0,0,0,4,1,9,0,0,5], [0,0,0,0,8,0,0,7,9]
        ];

        board.forEach(row => row.forEach(n => {
            const cell = document.createElement('div');
            cell.className = "w-9 h-9 md:w-11 md:h-11 flex items-center justify-center font-bold text-xl";
            cell.innerText = n ? mongolNums[n] : "";
            container.appendChild(cell);
        }));
    }

    // 7. СИСТЕМИЙН ШИЛЖИЛТ
    function showSection(name) {
        document.getElementById('dashboardHome').classList.add('hidden');
        document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
        document.getElementById(name + 'Section').classList.add('active');
        if(name === 'games') generateSudoku();
    }
    function showDashboard() {
        document.getElementById('dashboardHome').classList.remove('hidden');
        document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
    }
    function openCheckout(name) { selectedItemName = name; document.getElementById('checkoutModal').classList.add('active'); }
    function closeCheckout() { document.getElementById('checkoutModal').classList.remove('active'); }
    function submitOrder() { alert("Хүсэлт илгээгдлээ!"); closeCheckout(); }
</script>
</body>
</html>
