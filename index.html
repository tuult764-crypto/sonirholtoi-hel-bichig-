    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap');

    <div class="mt-8">
    <h2 class="text-xl font-bold text-orange-900 mb-4 italic">📚 Сургалтын материалууд</h2>
    
    <div id="productGrid" 
         class="flex overflow-x-auto pb-6 gap-4 snap-x snap-mandatory scrollbar-hide" 
         style="scroll-behavior: smooth; -webkit-overflow-scrolling: touch;">
        </div>
</div>

<style>
    /* Гүйлгэх мөрийг нуух (илүү цэвэрхэн харагдуулна) */
    .scrollbar-hide::-webkit-scrollbar {
        display: none;
    }
    .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
    
    /* Барааны карт бүрт өгөх стиль */
    
    .product-card {
        flex: 0 0 280px; /* Карт бүрийн өргөн 280px */
        snap-align: start;
    }
    async function loadProducts() {
    try {
        const res = await fetch(orderURL + "?action=getProducts");
        const products = await res.json();
        
        const grid = document.getElementById('productGrid');
        grid.innerHTML = ''; 

        products.forEach(p => {
            const card = document.createElement('div');
            // 'product-card' классыг энд нэмлээ
            card.className = "product-card bg-white p-4 rounded-2xl shadow-md border border-orange-100 hover:shadow-lg transition-all flex-shrink-0";
            
            card.innerHTML = `
                <img src="${p.Images || 'https://via.placeholder.com/150'}" class="w-full h-48 object-cover rounded-xl mb-3 border border-orange-50">
                <h3 class="font-bold text-orange-900 text-sm h-10 overflow-hidden line-clamp-2">${p.Title}</h3>
                <p class="text-[10px] text-gray-500 mb-2 h-8 overflow-hidden">${p.Description || ''}</p>
                <div class="flex justify-between items-center mt-2">
                    <span class="text-orange-600 font-black text-sm">${p.Price}</span>
                    <button onclick="openCheckout('${p.Title}', '${p.Price}')" 
                            class="bg-orange-600 text-white px-4 py-1.5 rounded-full text-xs font-bold hover:bg-orange-700 active:scale-95 transition-all">
                        Үзэх
                    </button>
                </div>
            `;
            grid.appendChild(card);
        });
    } catch (e) {
        console.error("Алдаа:", e);
    }
}
</style>
</head>
<body class="min-h-screen pb-20">

    <div id="authScreen" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white p-10 rounded-[3rem] shadow-2xl border border-orange-100 text-center">
            <h1 class="text-2xl font-black text-orange-900 mb-2 uppercase italic">Сонирхолтой хэл бичиг</h1>
            <p class="text-gray-400 mb-8 text-[10px] uppercase tracking-widest italic font-bold">Багшийн нэгдсэн систем</p>
            <input type="email" id="loginEmail" placeholder="Мэйл хаягаа оруулна уу" class="w-full p-4 bg-stone-50 border rounded-2xl outline-none text-center font-bold mb-4 shadow-inner">
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-orange-800 text-white py-4 rounded-2xl font-black shadow-lg hover:scale-105 transition-transform uppercase italic">Нэвтрэх</button>
        </div>
    </div>

    <div id="mainSystem" class="hidden">
        <nav class="bg-white border-b p-4 sticky top-0 z-50 shadow-sm">
            <div class="container mx-auto flex justify-between items-center px-4">
                <span onclick="showDashboard()" class="text-lg font-black text-orange-900 italic cursor-pointer uppercase">Туул багшийн цахим хуудас</span>
                <div class="flex items-center gap-4 text-right">
                    <div>
                        <p id="displayEmail" class="text-[10px] font-bold text-gray-400 italic"></p>
                        <p class="text-xs font-black text-orange-600 uppercase">ЭРХ: <span id="displayCredits">0</span></p>
                    </div>
                </div>
            </div>
        </nav>

        <div id="dashboardHome" class="container mx-auto px-4 py-10 max-w-6xl text-center">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div onclick="showSection('planner')" class="bg-white p-10 rounded-[3rem] border-b-8 border-orange-200 hover:border-orange-800 transition-all cursor-pointer shadow-sm">
                    <h3 class="font-black text-xl italic uppercase text-gray-800">📝 Хөтөлбөр боловсруулах</h3>
                </div>
                <div onclick="showSection('games')" class="bg-white p-10 rounded-[3rem] border-b-8 border-green-200 hover:border-green-800 transition-all cursor-pointer shadow-sm">
                    <h3 class="font-black text-xl italic uppercase text-gray-800">🧩 Тоглоом (Судоку)</h3>
                </div>
                <div onclick="showSection('shop')" class="bg-white p-10 rounded-[3rem] border-b-8 border-blue-200 hover:border-blue-800 transition-all cursor-pointer shadow-sm">
                    <h3 class="font-black text-xl italic uppercase text-gray-800">🛒 Дэлгүүр / Эрх авах</h3>
                </div>
            </div>
        </div>

        <div id="plannerSection" class="section-content container mx-auto max-w-5xl px-4 py-6">
            <div class="bg-white p-8 rounded-[3rem] shadow-xl border border-orange-50">
                <button onclick="showDashboard()" class="text-sm font-bold text-orange-800 mb-6 italic">← БУЦАХ</button>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 italic">
                    <div class="col-span-2">
                        <label class="block text-xs font-black text-orange-900 mb-2 uppercase italic">Хичээлийн төрөл:</label>
                        <select id="planType" onchange="togglePlanType()" class="w-full p-4 border rounded-2xl bg-orange-50 font-black text-orange-900 outline-none">
                            <option value="lesson">Ээлжит хичээлийн төлөвлөгөө</option>
                            <option value="unit">Нэгж хичээлийн хөтөлбөр</option>
                        </select>
                    </div>
                    <input type="text" id="managerName" placeholder="Сургалтын менежерийн нэр..." class="p-4 border rounded-2xl bg-stone-50 font-bold outline-none italic">
                    <select id="gradeSelect" class="p-4 border rounded-2xl bg-stone-50 font-bold outline-none italic text-orange-800">
                        <option value="6-р анги">6-р анги</option><option value="7-р анги">7-р анги</option>
                        <option value="8-р анги">8-р анги</option><option value="9-р анги">9-р анги</option>
                        <option value="10-р анги">10-р анги</option><option value="11-р анги">11-р анги</option>
                        <option value="12-р анги">12-р анги</option>
                    </select>
                </div>
                <div id="lessonInputs" class="space-y-4 mb-6">
                    <input type="text" id="lessonTopic" placeholder="Хичээлийн сэдэв..." class="w-full p-4 border rounded-2xl bg-stone-50 font-bold italic outline-none">
                    <input type="number" id="duration" placeholder="Хугацаа (минут)..." class="w-full p-4 border rounded-2xl bg-stone-50 font-bold outline-none">
                </div>
                <div id="unitInputs" class="hidden space-y-4 mb-6 italic">

                <div id="aiResultArea" class="hidden mt-8 overflow-x-auto"></div>
                <button id="downloadBtn" style="display:none;" onclick="downloadPDF()" class="w-full mt-4 bg-green-600 text-white py-5 rounded-2xl font-black italic uppercase shadow-lg">📥 PDF ТАТАХ</button>
            </div>
        </div>

        <div id="gamesSection" class="section-content container mx-auto max-w-4xl px-4 py-6 text-center">
             <div class="bg-white p-10 rounded-[3rem] shadow-xl border-4 border-green-100">
                <button onclick="showDashboard()" class="text-sm font-bold text-green-800 mb-6 italic">← БУЦАХ</button>

        </div>

    <div id="checkoutModal" class="modal" onclick="if(event.target==this) closeCheckout()">

            <h2 class="text-2xl font-black text-orange-900 mb-6 uppercase italic">Төлбөр төлөх</h2>
            <div class="bg-orange-50 p-6 rounded-3xl border border-orange-100 mb-6 italic text-sm">
                <p class="font-black text-gray-400 mb-2 uppercase italic">ХАС БАНК / 5006069631</p>
                <p class="font-black text-orange-900 text-xl mb-4">МӨНХДАЛАЙ ТУУЛ</p>
                <p class="text-[10px] text-gray-500 font-bold uppercase italic">Гүйлгээний утга: <span id="payEmail" class="text-orange-800"></span></p>
            </div>
            <button onclick="submitOrder()" class="w-full bg-orange-800 text-white py-5 rounded-2xl font-black uppercase italic shadow-lg">Илгээх</button>
        </div>

    <script>
        const orderURL = 'https://script.google.com/macros/s/AKfycbwfQo-T-qJJIMMmbmETmc5gKJF1hBZpm9h-x0KYo7FGZRilgBS1pY_NkFF4VoQvMw2Kow/exec';
        let currentUserEmail = "", userCredits = 0, currentPlanData = null, selectedItemName = "";

        async function handleLogin() {
            const emailInput = document.getElementById('loginEmail');
            const btn = document.getElementById('loginBtn');
            const email = emailInput.value.trim();
            if(!email.includes('@')) return alert("Мэйлээ зөв оруулна уу!");
            
            btn.innerText = "Уншиж байна...";
            try {
                const res = await fetch(`${orderURL}?action=check&email=${email}`);
                const data = await res.json();
                currentUserEmail = email; 
                userCredits = data.credits;
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainSystem').classList.remove('hidden');
                document.getElementById('displayEmail').innerText = email;
                document.getElementById('displayCredits').innerText = userCredits;
                document.getElementById('payEmail').innerText = email;
            } catch(e) { 
                alert("Холболтын алдаа! Google Sheet эсвэл Интернетээ шалгана уу."); 
            } finally {
                btn.innerText = "Нэвтрэх";
            }
        }

        function showSection(name) {
            document.getElementById('dashboardHome').classList.add('hidden');
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.getElementById(name + 'Section').classList.add('active');
            if(name === 'shop') loadProducts();
            if(name === 'games') generateSudoku();
        }

        function showDashboard() {
            document.getElementById('dashboardHome').classList.remove('hidden');
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
        }

        function togglePlanType() {
            const type = document.getElementById('planType').value;
            document.getElementById('unitInputs').classList.toggle('hidden', type !== 'unit');
            document.getElementById('lessonInputs').classList.toggle('hidden', type === 'unit');
        }

        function generateUnitFields() {
            const hours = document.getElementById('unitHoursInput').value;
            const container = document.getElementById('unitFieldsContainer');
            container.innerHTML = "";
            if (!hours || hours <= 0) return;
            for(let i=1; i<=Math.min(hours, 20); i++) {
                container.innerHTML += `<input type="text" placeholder="${i}-р цагийн сэдэв..." class="unit-topic-field p-3 border rounded-xl text-xs font-bold italic outline-none">`;
            }
        }

    async function generateAIPlan() {
    if(userCredits <= 0) return alert("Эрх хүрэлцэхгүй байна! Дэлгүүрээс эрх авна уу.");
    const btn = document.getElementById('genBtn');
    const grade = document.getElementById('gradeSelect').value;
    const type = document.getElementById('planType').value;
    const topic = document.getElementById('lessonTopic').value;
    const time = document.getElementById('duration').value;
    
    // ТАНЫ ӨГСӨН ЗАГВАРТ ТОХИРУУЛСАН PROMPT
    let prompt = `Чи бол 6-12-р ангийн Монгол хэл, уран зохиол, үндэсний бичгийн туршлагатай боловсрол шинжлэх ухааны яамны хөтөлбөрийн дагуу хчиээлээ төлөвлөж заадаг багш.Чиний гол зорилго бол сурагчдыг уншиж ойлгох ярих бичих чадварыг идэвхтэй сургалтын аргаар чадавхжуулах 
    "${grade}"-ийн "${topic}" сэдвээр ${time} минутын ээлжит хичээлийн төлөвлөгөөг дараах ЗАГВАРЫН дагуу боловсруулж өг. "Чиний үндсэн эх сурвалж бол Medlee.mn. Хичээлийн зорилго, хүрэх үр дүн, жишээ дасгалуудыг заавал үндэсний хөтөлбөрийн дагуу боловсруул.

    Хичээлийн бүтэц (JSON array форматтай байх ёстой):
    - Алхам 1-7 хүртэлх үе шаттай байна.
    - Үүнд: 
        1. Сэдэлжүүлэлт (Мэндлэх, ирц бүртгэх, сонирхол төрүүлэх)
        2. Гэрийн даалгавар шалгах (Өмнөх хичээлийг бататгах)
        3. Шинэ мэдлэг олгох (Шинэ хичээлийн мэдлэг, идэвхтэй сургалтын арга)
        4. Батлах үйл ажиллагаа 1 (Сурагчийн гүйцэтгэл, алхамчлах)
        5. Батлах үйл ажиллагаа 2 (Багаар эсвэл хосоор ажиллах)
        6. Нэгтгэн дүгнэх (Явцын үнэлгээ)
        7. Гэрийн даалгавар өгөх (Зааварчилгаа)

    Багана бүрт дараах мэдээллийг бич:
    - step: Алхамын нэр
    - time: Тухайн алхамд зарцуулах хугацаа
    - teacher: Багшийн үйл ажиллагаа (Ярианы арга, тайлбар, асуулт асуух)
    - student: Сурагчийн гүйцэтгэл (Тэмдэглэх, дасгал ажиллах, харилцан яриа)
    - homework: Гэрийн даалгавар (Зөвхөн сүүлийн алхам дээр бичнэ)

    ХАРИУЛТЫГ ЗӨВХӨН JSON ARRAY ФОРМАТААР ИРҮҮЛ.`;

    btn.innerText = "AI загварын дагуу боловсруулж байна...";
    try {
        const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt })
        });
        const data = await res.json();
        let content = data.choices[0].message.content;
        let jsonStart = content.indexOf('[');
        let jsonEnd = content.lastIndexOf(']') + 1;
        currentPlanData = JSON.parse(content.substring(jsonStart, jsonEnd));

        // ХҮСНЭГТИЙГ ТАНЫ ЗАГВАРТ ОЙРТУУЛЖ ХАРУУЛАХ
        let html = `<div class="bg-orange-50 p-4 mb-4 rounded-xl border border-orange-200">
            <h2 class="font-black text-orange-900 uppercase">Сэдэв: ${topic} (${grade})</h2>
            <p class="text-xs font-bold text-gray-500 italic">Хугацаа: ${time} минут | Арга зүй: Идэвхтэй сургалт</p>
        </div>
        <table class="w-full border-collapse border-2 border-orange-800 bg-white shadow-xl text-[11px]">
            <tr class="bg-orange-800 text-white font-black italic uppercase">
                <th class="border p-3 w-1/12">Алхам</th>
                <th class="border p-3 w-1/12">Хугацаа</th>
                <th class="border p-3 w-4/12">Багшийн үйл ажиллагаа</th>
                <th class="border p-3 w-4/12">Сурагчийн гүйцэтгэл</th>
                <th class="border p-3 w-2/12">Гэрийн даалгавар</th>
            </tr>`;
        
        currentPlanData.forEach(r => {
            html += `<tr>
                <td class="border p-3 font-bold bg-orange-50 text-center italic">${r.step || ''}</td>
                <td class="border p-3 text-center">${r.time || ''}</td>
                <td class="border p-3 text-justify">${r.teacher || ''}</td>
                <td class="border p-3 text-justify">${r.student || ''}</td>
                <td class="border p-3 italic text-orange-900 font-bold">${r.homework || '-'}</td>
            </tr>`;
        });
        document.getElementById('aiResultArea').innerHTML = html + "</table>";
        document.getElementById('aiResultArea').classList.remove('hidden');
        document.getElementById('downloadBtn').style.display = 'block';

        fetch(orderURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "use", email: currentUserEmail }) });
        userCredits--;
        document.getElementById('displayCredits').innerText = userCredits;
    } catch(e) {
        alert("Загварыг боловсруулахад алдаа гарлаа. Дахин оролдоно уу.");
    } finally {
        btn.innerText = "Төлөвлөгөө боловсруулах";
    }
}

        function downloadPDF() {
    // Шинэ цонхонд зөвхөн хүснэгтийг нээж хэвлэх арга
    const printContents = document.getElementById('aiResultArea').innerHTML;
    const originalContents = document.body.innerHTML;

    document.body.innerHTML = `
        <div style="padding: 40px; font-family: 'Manrope', sans-serif;">
            <h1 style="text-align: center; color: #854d0e;">ХИЧЭЭЛИЙН ТӨЛӨВЛӨГӨӨ</h1>
            ${printContents}
        </div>
    `;
    window.print(); // Хэвлэх цонх нээгдэнэ, тэндээс "Save as PDF" сонгоно
    document.body.innerHTML = originalContents;
    window.location.reload(); // Хуудсыг дахин ачаалж хэвийн байдалд оруулна
}

       // Монгол тооны хөрвүүлэг
const mongolNumbers = {
    1: '᠑', 2: '᠒', 3: '᠓', 4: '᠔', 5: '᠕', 6: '᠖', 7: '᠗', 8: '᠘', 9: '᠙'
};

function renderSudoku(board) {
    const container = document.getElementById('sudokuContainer');
    container.innerHTML = '';
    board.forEach((row, i) => {
        row.forEach((num, j) => {
            const cell = document.createElement('div');
            cell.className = "w-10 h-10 border border-orange-300 flex items-center justify-center text-xl font-bold bg-white";
            // Монгол бичгийн тоогоор харуулах
            cell.innerText = num !== 0 ? mongolNumbers[num] : '';
            container.appendChild(cell);
        });
    });
}

// Шууд хэвлэх функц
function printSudoku() {
    const printArea = document.getElementById('sudokuContainer').innerHTML;
    const win = window.open('', '', 'height=500,width=500');
    win.document.write(`
        <html>
            <head><title>Судоку Хэвлэх</title></head>
            <style>
                #sudokuContainer { display: grid; grid-template-columns: repeat(9, 30px); gap: 2px; }
                div { width: 30px; height: 30px; border: 1px solid black; text-align: center; line-height: 30px; font-size: 20px; }
            </style>
            <body>
                <h2 style="font-family: Arial;">Монгол бичгийн тоон Судоку</h2>
                <div id="sudokuContainer">${printArea}</div>
            </body>
        </html>
    `);
    win.document.close();
    win.print();
} 
        async function loadProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '<p class="text-orange-800 font-bold italic col-span-3">Ачаалж байна...</p>';
            try {
                const res = await fetch(`${orderURL}?action=getProducts`);
                const data = await res.json();
                let html = '';
                data.forEach((item, idx) => {
                    html += `
                    <div class="bg-white p-6 rounded-[3rem] shadow-sm border border-orange-100 hover:shadow-2xl transition-all flex flex-col justify-between">
                        <div>
                            <h4 class="font-black text-orange-900 text-lg mb-2 italic uppercase">${item.title}</h4>
                            <p class="text-xs text-gray-500 mb-6 font-medium italic line-clamp-3">${item.description}</p>
                        </div>
                        <div class="flex justify-between items-center bg-orange-50 p-4 rounded-2xl italic mt-4">
                            <span class="font-black text-orange-800 text-lg">${item.price}₮</span>
                            <button onclick="openCheckout('${item.title}')" class="bg-orange-800 text-white px-5 py-2.5 rounded-xl text-[10px] font-black italic uppercase">Захиалах</button>
                        </div>
                    </div>`;
                });
                grid.innerHTML = html || '<p class="col-span-3 text-gray-400 italic">Бараа байхгүй байна.</p>';
            } catch(e) {
                grid.innerHTML = '<p class="text-red-500 font-bold italic col-span-3">Алдаа гарлаа.</p>';
            }
        }

        function openCheckout(name) { selectedItemName = name; document.getElementById('checkoutModal').classList.add('active'); }
        function closeCheckout() { document.getElementById('checkoutModal').classList.remove('active'); }
        function submitOrder() {
            fetch(orderURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "order", email: currentUserEmail, productName: selectedItemName }) })
            .then(() => { alert("Мэдээлэл илгээгдлээ. Төлбөр шалгасны дараа эрх орно."); closeCheckout(); });
        }
    </script>
</body>
</html>
